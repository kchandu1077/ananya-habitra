                        overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',lineHeight:1.35}}>
                        {task.text}
                        {task.recur&&task.recur!=='none'&&<span style={{marginLeft:5,fontSize:10,color:P,fontWeight:700}}>🔁{task.recur}</span>}
                      </div>
                      <div style={{display:'flex',alignItems:'center',gap:6,marginTop:2,flexWrap:'wrap'}}>
                        {task.date&&(
                          <span style={{fontSize:10,fontWeight:700,
                            color:overdue?'#E53935':isToday?P:'#9E94C0'}}>
                            {overdue?'⚠️ Overdue':isToday?'📌 Today':'📅'} {fmtDate(task.date)}
                          </span>
                        )}
                        {task.reminder&&<span style={{fontSize:10,color:'#7B1FA2',fontWeight:700}}>🔔{task.reminder}</span>}
                        {task.notes&&<span style={{fontSize:10,color:TS,fontWeight:500}}>📝 note</span>}
                      </div>
                    </div>

                    {/* Delete */}
                    <div style={{display:'flex',gap:5,flexShrink:0}}>
                      <button onClick={()=>deleteTask(task.id)}
                        style={{background:'none',border:'none',cursor:'pointer',
                          padding:'4px',borderRadius:8,opacity:0.35,
                          display:'flex',alignItems:'center',justifyContent:'center',
                          transition:'opacity 0.15s'}}
                        onMouseEnter={e=>e.currentTarget.style.opacity='1'}
                        onMouseLeave={e=>e.currentTarget.style.opacity='0.35'}>
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
                          <path d="M18 6L6 18M6 6l12 12" stroke="#D32F2F" strokeWidth="2.5" strokeLinecap="round"/>
                        </svg>
                      </button>
                    </div>
                  </div>

                  {/* Expanded notes + edit */}
                  {isExpanded&&(
                    <div style={{padding:'0 14px 12px',background:`${P}03`}}>
                      {isEditing?(
                        <div style={{display:'flex',flexDirection:'column',gap:7}}>
                          <textarea value={task.notes||''}
                            onChange={e=>updateTask(task.id,{notes:e.target.value})}
                            placeholder="Add a note…" rows={2}
                            style={{width:'100%',border:`2px solid ${P}`,borderRadius:10,
                              padding:'8px 10px',fontSize:12,color:TX,background:SUR,
                              resize:'none',boxSizing:'border-box',outline:'none',lineHeight:1.4,
                              fontFamily:'Nunito,sans-serif'}}/>
                          <button onClick={()=>setEditingTaskId(null)}
                            style={{alignSelf:'flex-end',background:PC,border:'none',
                              borderRadius:9,padding:'6px 14px',color:P,fontWeight:800,
                              fontSize:12,cursor:'pointer',fontFamily:'Nunito,sans-serif'}}>
                            Done
                          </button>
                        </div>
                      ):(
                        <div>
                          {task.notes?(
                            <div style={{fontSize:12,color:TM,lineHeight:1.5,
                              background:SV,borderRadius:10,padding:'8px 10px',marginBottom:6}}>
                              📝 {task.notes}
                            </div>
                          ):null}
                          <div style={{display:'flex',gap:7}}>
                            <button onClick={()=>setEditingTaskId(task.id)}
                              style={{background:PC,border:'none',borderRadius:9,
                                padding:'5px 12px',color:P,fontSize:11,fontWeight:700,
                                cursor:'pointer',fontFamily:'Nunito,sans-serif'}}>
                              ✏️ {task.notes?'Edit note':'Add note'}
                            </button>
                            {['high','medium','low'].map(p=>(
                              <button key={p} onClick={()=>updateTask(task.id,{priority:p})}
                                style={{padding:'5px 9px',borderRadius:9,
                                  border:`1.5px solid ${(task.priority||'medium')===p?PRIORITY_CFG[p].color:OL}`,
                                  background:(task.priority||'medium')===p?PRIORITY_CFG[p].bg:SV,
                                  color:(task.priority||'medium')===p?PRIORITY_CFG[p].color:TS,
                                  fontSize:10,fontWeight:700,cursor:'pointer',
                                  fontFamily:'Nunito,sans-serif'}}>
                                ● {PRIORITY_CFG[p].label}
                              </button>
                            ))}
                          </div>
                        </div>
                      )}
                    </div>
                  )}
                </div>
              );
            })}

            {/* ── COMPLETED ── */}
            {doneTasks.length>0&&(
              <div>
                <button onClick={()=>setShowCompletedTasks(v=>!v)}
                  style={{display:'flex',alignItems:'center',gap:7,width:'100%',
                    padding:'9px 14px',background:'none',border:'none',cursor:'pointer',
                    borderTop:`1px solid ${OL}`}}>
                  <span style={{fontSize:11,color:TS,fontWeight:700,flex:1,textAlign:'left'}}>
                    ✅ {doneTasks.length} completed
                  </span>
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none">
                    <path d={showCompletedTasks?"M18 15l-6-6-6 6":"M6 9l6 6 6-6"} stroke={TS} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
                  </svg>
                </button>
                {showCompletedTasks&&doneTasks.map((task)=>(
                  <div key={task.id} style={{display:'flex',alignItems:'center',gap:10,
                    padding:'9px 14px',borderTop:`1px solid ${OL}`,background:SV,opacity:0.75}}>
                    <button onClick={()=>toggleTask(task.id)}
                      style={{width:22,height:22,borderRadius:7,border:'none',background:'#43A047',
                        cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',padding:0,flexShrink:0}}>
                      <svg width="12" height="12" viewBox="0 0 24 24" fill="none">
                        <path d="M5 13l4 4L19 7" stroke="#FFF" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
                      </svg>
                    </button>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:13,fontWeight:500,color:TS,
                        textDecoration:'line-through',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                        {task.text}
                      </div>
                      {task.date&&<div style={{fontSize:10,color:'#BCBCBC',marginTop:1}}>{fmtDate(task.date)}</div>}
                    </div>
                    <button onClick={()=>deleteTask(task.id)}
                      style={{background:'none',border:'none',cursor:'pointer',padding:'4px',opacity:0.35,flexShrink:0}}>
                      <svg width="13" height="13" viewBox="0 0 24 24" fill="none">
                        <path d="M18 6L6 18M6 6l12 12" stroke="#D32F2F" strokeWidth="2.5" strokeLinecap="round"/>
                      </svg>
                    </button>
                  </div>
                ))}
              </div>
            )}
          </div>
        );
      })()}

      {/* ── DUE REVISIONS (collapsible) ── */}
      {dueEntries.length>0&&(
        <div style={{background:SUR,borderRadius:16,border:'1.5px solid #FFB74D',
          overflow:'hidden',boxShadow:'0 2px 10px rgba(255,152,0,0.1)'}}>
          <button onClick={()=>setShowDueRevs(v=>!v)}
            style={{display:'flex',alignItems:'center',gap:10,width:'100%',
              padding:'12px 16px',background:'none',border:'none',cursor:'pointer',textAlign:'left'}}>
            <div style={{width:8,height:8,borderRadius:'50%',background:'#E65100',flexShrink:0}}/>
            <span style={{flex:1,fontSize:13,fontWeight:800,color:'#E65100'}}>
              {dueEntries.length} Revision{dueEntries.length>1?'s':''} Due
            </span>
            <Ico d={showDueRevs?IC.up:IC.down} s={14} c='#E65100'/>
          </button>
          {showDueRevs&&(
            <div style={{padding:'0 14px 12px',display:'flex',flexDirection:'column',gap:7}}>
              {dueEntries.slice(0,4).map(entry=>{
                const dueIntervals=REV_INTERVALS.filter(iv=>isRevDueToday(entry,iv)||isRevOverdue(entry,iv));
                const isOver=dueIntervals.some(iv=>isRevOverdue(entry,iv));
                const col=subjColor(entry.subject);
                return(
                  <div key={entry.id} style={{background:isOver?SV:'#28200A22',
                    borderRadius:12,padding:'10px 12px',
                    border:`1px solid ${isOver?'#C6282844':'#FFE0B255'}`}}>
                    <div style={{display:'flex',alignItems:'center',gap:7,marginBottom:7}}>
                      <span style={{fontSize:11,fontWeight:800,color:col,
                        background:col+'18',borderRadius:7,padding:'2px 8px'}}>{entry.subject}</span>
                      {entry.topic&&<span style={{fontSize:11,color:TM,flex:1,overflow:'hidden',
                        textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{entry.topic}</span>}
                      {isOver&&<Chip label="OVERDUE" color='#C62828' small/>}
                      <span style={{fontSize:10,color:TS,marginLeft:'auto',flexShrink:0}}>{fmtDate(entry.dateStudied)}</span>
                    </div>
                    <div style={{display:'flex',gap:5,flexWrap:'wrap'}}>
                      {dueIntervals.map(iv=>(
                        <button key={iv} onClick={()=>onRevToggle(entry.id,iv)}
                          style={{padding:'5px 10px',borderRadius:9,
                            border:`1.5px solid ${entry.reviews[String(iv)]===true?'#43A047':'#FFB74D'}`,
                            background:entry.reviews[String(iv)]===true?'#1B3A1E':SV,
                            color:entry.reviews[String(iv)]===true?'#66BB6A':'#E65100',
                            fontSize:11,fontWeight:700,cursor:'pointer',
                            fontFamily:'Nunito,sans-serif',transition:'all 0.15s'}}>
                          {entry.reviews[String(iv)]===true?'✓ ':''}{REV_LABELS[iv]}
                        </button>
                      ))}
                    </div>
                  </div>
                );
              })}
              {dueEntries.length>4&&(
                <div style={{fontSize:11,color:'#E65100',fontWeight:600,paddingLeft:2}}>
                  +{dueEntries.length-4} more → Revise tab
                </div>
              )}
            </div>
          )}
        </div>
      )}

      {/* ── HABITS CARD ── */}
      <div style={{background:SUR,borderRadius:16,border:`1px solid ${OL}`,
        boxShadow:'0 1px 6px rgba(103,80,164,0.06)',overflow:'hidden'}}>
        <div style={{padding:'12px 16px 8px',display:'flex',alignItems:'center',
          justifyContent:'space-between',borderBottom:`1px solid ${OL}`}}>
          <span style={{fontSize:10,fontWeight:800,color:TS,letterSpacing:1.2,textTransform:'uppercase'}}>
            Today's Habits
          </span>
          <span style={{fontSize:11,fontWeight:700,color:P}}>{todayDone}/{daily.length} done</span>
        </div>
        {daily.length===0&&(
          <div style={{textAlign:'center',padding:'28px 20px',color:TS}}>
            <div style={{fontSize:32,marginBottom:6}}>🎯</div>
            <div style={{fontSize:13,fontWeight:700}}>No habits yet — add in Settings tab</div>
          </div>
        )}
        {daily.map((h,i)=>{
          const done=!!(logs[TK]||{})[i];
          const st=getStreak(logs,i);
          const col=hc(i);
          return(
            <button key={i} className={`hbtn${done?' habit-done-row':''}`} onClick={()=>toggleToday(i)}
              style={{display:'flex',alignItems:'center',gap:11,width:'100%',
                padding:'10px 16px',
                background:done?col.bg+'88':'transparent',
                border:'none',borderBottom:`1px solid ${done?col.f+'22':OL}`,
                textAlign:'left',cursor:'pointer',transition:'background 0.12s'}}>
              <div style={{width:22,height:22,borderRadius:7,flexShrink:0,
                background:done?col.f:OL,
                display:'flex',alignItems:'center',justifyContent:'center',
                transition:'all 0.15s'}}>
                {done&&<Ico d={IC.check} s={12} c='#FFF' sw={3}/>}
              </div>
              <span style={{flex:1,fontSize:13,fontWeight:done?600:700,
                color:done?col.dk:TX,
                textDecoration:done?'line-through':'none',lineHeight:1.35}}
                className={done?'habit-done-label':''}>
                {h}
              </span>
              {st>=3&&<span style={{fontSize:10,fontWeight:800,color:col.f,
                background:col.bg,border:`1px solid ${col.f}44`,
                padding:'2px 7px',borderRadius:8,flexShrink:0}}>🔥{st}</span>}
            </button>
          );
        })}
      </div>

      {/* ── SMART SUGGESTIONS (collapsible) ── */}
      <SuggestionsCard suggestions={suggestions}/>

    </div>
  );
}

/* ═══════════════════════════════════════════════════
   SETTINGS VIEW
   ═══════════════════════════════════════════════════ */
/* ═══════════════════════════════════════════════════
   ABSENCE / OFF-DAY MODAL
   ═══════════════════════════════════════════════════ */
const ABSENCE_LEVELS=[
  {pct:25,label:'25% Off',icon:'🤒',sub:'Slightly unwell / minor issue',color:'#F57C00',bg:'#FFF3E0',border:'#FFB74D',
   desc:'Only 25% of your day is lost. 75% still available.'},
  {pct:50,label:'50% Off',icon:'🌡️',sub:'Half-day unavailable',color:'#E65100',bg:'#FBE9E7',border:'#FFAB76',
   desc:'Half your planned study time is gone. Needs redistribution.'},
  {pct:75,label:'75% Off',icon:'😰',sub:'Mostly unavailable',color:'#C62828',bg:'#FFEBEE',border:'#EF9A9A',
   desc:'Only 25% productivity expected today. Serious redistribution needed.'},
  {pct:100,label:'Full Off',icon:'🏥',sub:'Complete absence',color:'#B71C1C',bg:'#FFCDD2',border:'#E57373',
   desc:'ZERO study today. All tasks pushed forward with extra load.'},
];

function AbsenceModal({onClose,onSave,existingAbsences,studyHours,daily}){
  const [selDate,setSelDate]=useState(todayStr());
  const [selPct,setSelPct]=useState(null);
  const [reason,setReason]=useState('');
  const [tab,setTab]=useState('add'); // 'add' | 'history'
  const [dailyHours,setDailyHours]=useState('');

  const existing=existingAbsences[selDate];
  const level=selPct!=null?ABSENCE_LEVELS.find(l=>l.pct===selPct):null;

  // Calculate how many days ahead load will be redistributed
  const getRedistributionPlan=(pct,hoursLost)=>{
    if(!hoursLost||hoursLost<=0)return[];
    // Spread extra hours over next 7 days (avoid weekends if possible, but no skip logic)
    const plan=[];
    let remaining=hoursLost;
    for(let i=1;i<=14&&remaining>0;i++){
      const d=addDays(selDate,i);
      const existingAbsence=existingAbsences[d];
      if(existingAbsence&&existingAbsence.pct===100)continue; // skip fully absent days
      const capacity=existingAbsence?((100-existingAbsence.pct)/100)*10:10;
      const add=Math.min(remaining,Math.round(capacity*0.3*10)/10); // max 30% extra per day
      if(add>0){plan.push({date:d,extraHours:Math.round(add*10)/10});remaining=Math.round((remaining-add)*10)/10;}
    }
    return plan;
  };

  const avgDailyHours=useMemo(()=>{
    const vals=Object.values(studyHours).filter(h=>h>0);
    if(!vals.length)return IDEAL_STUDY_HOURS;
    return Math.round((vals.reduce((a,b)=>a+b,0)/vals.length)*10)/10;
  },[studyHours]);

  const plannedHours=parseFloat(dailyHours)||avgDailyHours;
  const hoursLost=selPct!=null?Math.round(plannedHours*(selPct/100)*10)/10:0;
  const redistributionPlan=selPct!=null?getRedistributionPlan(selPct,hoursLost):[];

  const doSave=()=>{
    if(selPct===null)return;
    const absData={
      pct:selPct,reason:reason.trim(),hoursLost,plannedHours,
      redistribution:redistributionPlan,
      savedAt:new Date().toISOString()
    };
    onSave(selDate,absData);
    onClose();
  };

  const absenceHistory=Object.entries(existingAbsences)
    .sort(([a],[b])=>b.localeCompare(a))
    .slice(0,30);

  return(
    <div onClick={onClose}
      style={{position:'fixed',inset:0,background:'rgba(28,27,31,0.65)',
        display:'flex',alignItems:'flex-end',justifyContent:'center',
        zIndex:60,backdropFilter:'blur(5px)'}}>
      <div onClick={e=>e.stopPropagation()}
        style={{background:SUR,borderRadius:'26px 26px 0 0',width:'100%',maxWidth:500,
          boxShadow:'0 -8px 36px rgba(183,28,28,0.18)',
          maxHeight:'92vh',overflowY:'auto',
          fontFamily:'Nunito,sans-serif'}}>
        <div style={{width:34,height:4,borderRadius:2,background:OL,margin:'12px auto 0'}}/>

        {/* Header */}
        <div style={{padding:'14px 18px 0',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <div>
            <div style={{fontSize:18,fontWeight:900,color:'#B71C1C',letterSpacing:-0.3}}>🚨 Off-Day Declaration</div>
            <div style={{fontSize:11,color:TS,marginTop:2}}>Absence is SERIOUS — tasks will be redistributed</div>
          </div>
          <button onClick={onClose}
            style={{width:30,height:30,borderRadius:10,background:'#FFEBEE',border:'none',
              cursor:'pointer',fontSize:16,color:'#C62828',display:'flex',alignItems:'center',justifyContent:'center'}}>
            ×
          </button>
        </div>

        {/* Tab bar */}
        <div style={{display:'flex',background:SV,borderRadius:14,padding:3,margin:'12px 18px 0',gap:2}}>
          {[['add','📋 Mark Absence'],['history',`📜 History (${absenceHistory.length})`]].map(([id,lbl])=>(
            <button key={id} onClick={()=>setTab(id)}
              style={{flex:1,padding:'8px 4px',borderRadius:12,border:'none',
                background:tab===id?SUR:'transparent',
                color:tab===id?'#B71C1C':TS,
                fontSize:11,fontWeight:tab===id?800:600,cursor:'pointer',
                fontFamily:'Nunito,sans-serif',
                boxShadow:tab===id?'0 1px 4px rgba(183,28,28,0.15)':'none'}}>
              {lbl}
            </button>
          ))}
        </div>

        <div style={{padding:'14px 18px 36px'}}>

          {tab==='add'&&(<>
            {/* Date picker */}
            <div style={{marginBottom:14}}>
              <div style={{fontSize:11,fontWeight:700,color:TS,marginBottom:6}}>📅 Select Date</div>
              <input type="date" value={selDate} onChange={e=>setSelDate(e.target.value)}
                style={{width:'100%',border:`2px solid ${OL}`,borderRadius:12,
                  padding:'10px 12px',fontSize:14,fontWeight:700,color:TX,
                  background:SV,outline:'none',fontFamily:'Nunito,sans-serif',boxSizing:'border-box'}}/>
              {existingAbsences[selDate]&&(
                <div style={{marginTop:6,background:'#FFF3E0',borderRadius:10,padding:'8px 12px',
                  fontSize:11,fontWeight:700,color:'#E65100'}}>
                  ⚠️ Already marked {existingAbsences[selDate].pct}% absent on this day.
                  Saving again will overwrite.
                </div>
              )}
            </div>

            {/* Absence level selector */}
            <div style={{marginBottom:14}}>
              <div style={{fontSize:11,fontWeight:700,color:TS,marginBottom:8}}>
                🔴 Absence Level — how absent are you?
              </div>
              <div style={{display:'flex',flexDirection:'column',gap:8}}>
                {ABSENCE_LEVELS.map(lv=>(
                  <button key={lv.pct} onClick={()=>setSelPct(selPct===lv.pct?null:lv.pct)}
                    style={{display:'flex',alignItems:'center',gap:12,
                      background:selPct===lv.pct?lv.bg:SV,
                      border:`2.5px solid ${selPct===lv.pct?lv.color:OL}`,
                      borderRadius:16,padding:'12px 14px',cursor:'pointer',
                      textAlign:'left',fontFamily:'Nunito,sans-serif',
                      transition:'all 0.15s',
                      boxShadow:selPct===lv.pct?`0 2px 12px ${lv.color}33`:'none'}}>
                    <span style={{fontSize:24,flexShrink:0}}>{lv.icon}</span>
                    <div style={{flex:1}}>
                      <div style={{fontSize:14,fontWeight:900,
                        color:selPct===lv.pct?lv.color:TX}}>{lv.label}</div>
                      <div style={{fontSize:11,color:selPct===lv.pct?lv.color:TS,marginTop:1,fontWeight:600}}>
                        {lv.sub}
                      </div>
                    </div>
                    <div style={{width:22,height:22,borderRadius:'50%',flexShrink:0,
                      border:`2.5px solid ${selPct===lv.pct?lv.color:OL}`,
                      background:selPct===lv.pct?lv.color:'transparent',
                      display:'flex',alignItems:'center',justifyContent:'center'}}>
                      {selPct===lv.pct&&<span style={{color:'#FFF',fontSize:12,fontWeight:900}}>✓</span>}
                    </div>
                  </button>
                ))}
              </div>
            </div>

            {/* Hours override */}
            {selPct!==null&&(
              <div style={{marginBottom:14}}>
                <div style={{fontSize:11,fontWeight:700,color:TS,marginBottom:6}}>
                  ⏱️ Planned study hours for this day (auto-detected: {avgDailyHours}h)
                </div>
                <input type="number" value={dailyHours}
                  onChange={e=>setDailyHours(e.target.value)}
                  placeholder={`${avgDailyHours} hrs (your avg)`}
                  min="0" max="24" step="0.5"
                  style={{width:'100%',border:`2px solid ${OL}`,borderRadius:12,
                    padding:'10px 12px',fontSize:14,fontWeight:700,color:TX,
                    background:SV,outline:'none',fontFamily:'Nunito,sans-serif',
                    boxSizing:'border-box'}}/>
              </div>
            )}

            {/* Impact preview */}
            {selPct!==null&&level&&(
              <div style={{background:'#FFEBEE',border:'2px solid #EF9A9A',
                borderRadius:16,padding:'14px',marginBottom:14}}>
                <div style={{fontSize:12,fontWeight:900,color:'#B71C1C',marginBottom:10}}>
                  💥 IMPACT ANALYSIS — {selDate===todayStr()?'TODAY':selDate}
                </div>
                <div style={{display:'flex',gap:10,marginBottom:12}}>
                  <div style={{flex:1,background:'rgba(255,255,255,0.7)',borderRadius:12,padding:'10px',textAlign:'center'}}>
                    <div style={{fontSize:22,fontWeight:900,color:'#B71C1C'}}>{hoursLost}h</div>
                    <div style={{fontSize:9,color:'#C62828',fontWeight:700,letterSpacing:0.5}}>HOURS LOST</div>
                  </div>
                  <div style={{flex:1,background:'rgba(255,255,255,0.7)',borderRadius:12,padding:'10px',textAlign:'center'}}>
                    <div style={{fontSize:22,fontWeight:900,color:'#E65100'}}>{selPct}%</div>
                    <div style={{fontSize:9,color:'#C62828',fontWeight:700,letterSpacing:0.5}}>ABSENCE</div>
                  </div>
                  <div style={{flex:1,background:'rgba(255,255,255,0.7)',borderRadius:12,padding:'10px',textAlign:'center'}}>
                    <div style={{fontSize:22,fontWeight:900,color:'#C62828'}}>{redistributionPlan.length}d</div>
                    <div style={{fontSize:9,color:'#C62828',fontWeight:700,letterSpacing:0.5}}>AFFECTED</div>
                  </div>
                </div>
                {redistributionPlan.length>0&&(
                  <>
                    <div style={{fontSize:11,fontWeight:800,color:'#B71C1C',marginBottom:8}}>
                      📋 Redistribution Plan — extra hours to compensate:
                    </div>
                    {redistributionPlan.map((p,i)=>(
                      <div key={i} style={{display:'flex',alignItems:'center',gap:10,
                        background:'rgba(255,255,255,0.6)',borderRadius:10,padding:'8px 10px',marginBottom:5}}>
                        <span style={{fontSize:11,color:'#C62828',fontWeight:700,minWidth:60}}>{fmtDate(p.date)}</span>
                        <div style={{flex:1,height:5,background:'#FFCDD2',borderRadius:3,overflow:'hidden'}}>
                          <div style={{height:'100%',width:`${Math.min(p.extraHours/2*100,100)}%`,
                            background:'#C62828',borderRadius:3}}/>
                        </div>
                        <span style={{fontSize:12,fontWeight:900,color:'#B71C1C',minWidth:38,textAlign:'right'}}>
                          +{p.extraHours}h
                        </span>
                      </div>
                    ))}
                    <div style={{fontSize:10,color:'#D32F2F',fontWeight:700,marginTop:6,lineHeight:1.5,
                      background:'rgba(255,255,255,0.5)',borderRadius:8,padding:'6px 8px'}}>

/* ── ExtraHoursDebt (shown on Today screen) ──────────── */
function ExtraHoursDebt({absences,todayStr:today,studyHours}){
  const debt=useMemo(()=>{
    let total=0;
    Object.values(absences).forEach(abs=>{
      if(!abs.redistribution)return;
      abs.redistribution.forEach(p=>{
        if(p.date===today)total+=p.extraHours||0;
      });
    });
    return Math.round(total*10)/10;
  },[absences,today]);

  if(debt<=0)return null;
  const todayLogged=studyHours[today]||0;
  const covered=Math.min(todayLogged,debt);
  const remaining=Math.max(0,Math.round((debt-covered)*10)/10);

  return(
    <div style={{background:SUR,border:`1px solid ${OL}`,borderRadius:14,
      padding:'11px 14px',marginBottom:4}}>
      <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:7}}>
        <span style={{fontSize:16}}>⏳</span>
        <div style={{flex:1}}>
          <div style={{fontSize:12,fontWeight:800,color:TM}}>Recovery hours due today</div>
          <div style={{fontSize:10,color:TS}}>From past absence — log study hours to cover</div>
        </div>
        <div style={{textAlign:'right'}}>
          <span style={{fontSize:14,fontWeight:900,color:remaining>0?'#E65100':'#2E7D32'}}>
            {remaining>0?`${remaining}h left`:'Done ✓'}
          </span>
        </div>
      </div>
      <div style={{height:5,background:OL,borderRadius:3,overflow:'hidden'}}>
        <div style={{height:'100%',borderRadius:3,transition:'width 0.5s',
          background:remaining===0?'#43A047':P,
          width:`${debt>0?Math.round((covered/debt)*100):0}%`}}/>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════
   WEEKLY VIEW
   ═══════════════════════════════════════════════════ */
function WeeklyView({weekly,wlogs,CWK,toggleWeekly,wkKey,daily,logs,setAddType,darkMode}){
  const wDone=weekly.filter((_,i)=>(wlogs[CWK]||{})[i]).length;
  const wTotal=weekly.length;
  const wPct=wTotal?Math.round(wDone/wTotal*100):0;

  const weekStats=useMemo(()=>{
    const weeks=[];
    for(let w=0;w<4;w++){
      const d=new Date();d.setDate(d.getDate()-w*7);
      const key=wkKey(d);
      const wDn=weekly.filter((_,i)=>(wlogs[key]||{})[i]).length;
      weeks.push({label:w===0?'This Week':w===1?'Last Week':`${w}w ago`,done:wDn,total:wTotal,pct:wTotal?Math.round(wDn/wTotal*100):0,key});
    }
    return weeks;
  },[wlogs,weekly]);

  const weekDays=useMemo(()=>{
    const days=[];
    const now=new Date();
    const todayMidnight=new Date(now.getFullYear(),now.getMonth(),now.getDate());
    const dow=now.getDay()===0?6:now.getDay()-1;
    const monday=new Date(todayMidnight);monday.setDate(todayMidnight.getDate()-dow);
    for(let i=0;i<7;i++){
      const d=new Date(monday);d.setDate(monday.getDate()+i);
      const k=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
      const done=daily.filter((_,idx)=>(logs[k]||{})[idx]).length;
      const isPast=d<todayMidnight;
      const isToday=d.getTime()===todayMidnight.getTime();
      days.push({label:['M','T','W','T','F','S','S'][i],done,total:daily.length,isPast,isToday,isFuture:d>todayMidnight,k});
    }
    return days;
  },[logs,daily]);

  return(
    <div style={{display:'flex',flexDirection:'column',gap:12}}>
      {/* TOP SUMMARY CARD */}
      <div style={{background:darkMode?'linear-gradient(135deg,#0E2215,#152A1A)':'linear-gradient(135deg,#E8F5E9,#C8E6C9)',
        borderRadius:22,padding:'18px',
        border:darkMode?'1px solid #1E4025':'1px solid #A5D6A7',
        boxShadow:darkMode?'0 4px 16px rgba(0,0,0,0.35)':'0 4px 16px rgba(56,142,60,0.14)'}}>
        <div style={{fontSize:10,fontWeight:800,color:darkMode?'#66BB6A':'#2E7D32',letterSpacing:1,textTransform:'uppercase',marginBottom:4}}>
          Week {CWK.split('-W')[1]} · {new Date().toLocaleDateString('en-IN',{day:'numeric',month:'short'})}
        </div>
        <div style={{display:'flex',alignItems:'center',gap:14,marginBottom:10}}>
          <div>
            <div style={{fontSize:36,fontWeight:900,color:darkMode?'#A5D6A7':'#1B5E20',lineHeight:1}}>{wPct}%</div>
            <div style={{fontSize:11,color:darkMode?'#81C784':'#388E3C',fontWeight:700}}>{wDone}/{wTotal} targets done</div>
          </div>
          <div style={{flex:1}}>
            <div style={{height:8,background:darkMode?'rgba(255,255,255,0.08)':'rgba(255,255,255,0.5)',borderRadius:5,overflow:'hidden',marginBottom:6}}>
              <div style={{height:'100%',width:`${wPct}%`,background:'linear-gradient(90deg,#43A047,#66BB6A)',borderRadius:5,transition:'width 0.5s'}}/>
            </div>
            {wPct===100&&<div style={{fontSize:11,fontWeight:800,color:darkMode?'#A5D6A7':'#1B5E20'}}>🎉 Perfect week!</div>}
            {wPct>0&&wPct<100&&<div style={{fontSize:11,color:darkMode?'#81C784':'#388E3C'}}>{wTotal-wDone} target{wTotal-wDone!==1?'s':''} remaining</div>}
            {wPct===0&&wTotal>0&&<div style={{fontSize:11,color:darkMode?'#81C784':'#388E3C'}}>Start ticking off goals 💪</div>}
          </div>
        </div>
        {daily.length>0&&(
          <div style={{background:darkMode?'rgba(0,0,0,0.25)':'rgba(255,255,255,0.45)',borderRadius:12,padding:'10px 12px'}}>
            <div style={{fontSize:9,fontWeight:800,color:darkMode?'#66BB6A':'#2E7D32',letterSpacing:1,textTransform:'uppercase',marginBottom:7}}>Daily habits this week</div>
            <div style={{display:'flex',gap:4,justifyContent:'space-between'}}>
              {weekDays.map((d,i)=>{
                const pct=d.total>0?Math.round(d.done/d.total*100):0;
                const bg=darkMode
                  ?(d.isFuture?'rgba(255,255,255,0.04)':d.isToday?(pct===100?'#2E7D32':pct>0?'#1B5E20':'rgba(255,255,255,0.08)'):pct===100?'#2E7D32':pct>0?'#1B5E20':'rgba(255,255,255,0.06)')
                  :(d.isFuture?'rgba(255,255,255,0.25)':d.isToday?(pct===100?'#43A047':pct>0?'#81C784':'rgba(255,255,255,0.6)'):pct===100?'#43A047':pct>0?'#81C784':'rgba(0,0,0,0.08)');
                const txtC=darkMode
                  ?(d.isFuture?'rgba(100,187,106,0.2)':pct===100?'#FFF':pct>0?'#A5D6A7':'#4A4568')
                  :(d.isFuture?'rgba(46,125,50,0.3)':pct===100?'#FFF':pct>0?'#1B5E20':'#9E9E9E');
                return(
                  <div key={i} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:3}}>
                    <div style={{width:'100%',aspectRatio:'1',maxWidth:32,borderRadius:8,background:bg,
                      display:'flex',alignItems:'center',justifyContent:'center',
                      border:d.isToday?(darkMode?'2px solid #43A047':'2px solid #1B5E20'):'2px solid transparent',
                      transition:'all 0.2s'}}>
                      <span style={{fontSize:10,fontWeight:900,color:txtC}}>
                        {d.isFuture?'·':pct===100?'✓':d.done>0?String(d.done):'—'}
                      </span>
                    </div>
                    <span style={{fontSize:8,fontWeight:d.isToday?900:600,
                      color:darkMode?(d.isToday?'#81C784':'#4A7A50'):(d.isToday?'#1B5E20':'#388E3C')}}>{d.label}</span>
                  </div>
                );
              })}
            </div>
          </div>
        )}
      </div>

      {/* WEEKLY TARGETS LIST */}
      <div style={{background:SUR,borderRadius:20,border:`1px solid ${OL}`,overflow:'hidden',boxShadow:'0 1px 6px rgba(103,80,164,0.06)'}}>
        <div style={{padding:'12px 16px 10px',display:'flex',alignItems:'center',justifyContent:'space-between',borderBottom:`1px solid ${OL}`}}>
          <span style={{fontSize:13,fontWeight:900,color:TX}}>📋 This Week's Targets</span>
          <button onClick={()=>setAddType('weekly')}
            style={{background:PC,border:'none',borderRadius:10,padding:'5px 12px',cursor:'pointer',color:P,fontSize:12,fontWeight:800,fontFamily:'Nunito,sans-serif'}}>
            + Add
          </button>
        </div>
        {wTotal===0&&(
          <div style={{textAlign:'center',padding:'28px 20px',color:TS}}>
            <div style={{fontSize:28,marginBottom:6}}>📋</div>
            <div style={{fontSize:13,fontWeight:700}}>No weekly targets yet</div>
            <div style={{fontSize:11,marginTop:4}}>Tap + Add to set goals for this week</div>
          </div>
        )}
        {weekly.map((h,i)=>{
          const done=!!(wlogs[CWK]||{})[i];
          const col=hc(i);
          return(
            <button key={i} onClick={()=>toggleWeekly(i)}
              style={{display:'flex',alignItems:'center',gap:12,width:'100%',padding:'13px 16px',
                background:done?col.bg+'55':'transparent',
                border:'none',borderBottom:`1px solid ${done?col.f+'22':OL}`,
                textAlign:'left',cursor:'pointer',transition:'background 0.15s',fontFamily:'Nunito,sans-serif'}}>
              <div style={{width:28,height:28,borderRadius:9,flexShrink:0,
                background:done?col.f:'transparent',border:`2.5px solid ${done?col.f:OL}`,
                display:'flex',alignItems:'center',justifyContent:'center',
                transition:'all 0.2s',boxShadow:done?`0 2px 10px ${col.f}44`:'none'}}>
                {done&&<Ico d={IC.check} s={14} c='#FFF' sw={3}/>}
              </div>
              <span style={{flex:1,fontSize:14,fontWeight:done?600:700,color:done?col.dk:TX,
                textDecoration:done?'line-through':'none',opacity:done?0.7:1}}>{h}</span>
              <span style={{fontSize:10,fontWeight:800,flexShrink:0,color:done?col.f:TS,
                background:done?col.bg:SV,border:`1px solid ${done?col.f+'44':OL}`,
                padding:'2px 8px',borderRadius:8}}>{done?'✓ Done':'Pending'}</span>
            </button>
          );
        })}
      </div>

      {/* LAST 4 WEEKS */}
      {wTotal>0&&(
        <div style={{background:SUR,borderRadius:18,border:`1px solid ${OL}`,padding:'12px 14px',boxShadow:'0 1px 4px rgba(103,80,164,0.05)'}}>
          <div style={{fontSize:10,fontWeight:800,color:TS,letterSpacing:1,textTransform:'uppercase',marginBottom:10}}>📈 Last 4 Weeks</div>
          <div style={{display:'flex',flexDirection:'column',gap:7}}>
            {weekStats.map((w,i)=>(
              <div key={i} style={{display:'flex',alignItems:'center',gap:10}}>
                <span style={{fontSize:10,fontWeight:700,color:i===0?P:TS,minWidth:62}}>{w.label}</span>
                <div style={{flex:1,height:6,background:OL,borderRadius:3,overflow:'hidden'}}>
                  <div style={{height:'100%',width:`${w.pct}%`,
                    background:i===0?`linear-gradient(90deg,${P},${P2})`:'linear-gradient(90deg,#81C784,#43A047)',
                    borderRadius:3,transition:'width 0.4s'}}/>
                </div>
                <span style={{fontSize:10,fontWeight:800,color:i===0?P:TS,minWidth:36,textAlign:'right'}}>{w.done}/{w.total}</span>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════════════════
   MAIN APP

function App(){
  const init=loadData();
  const [daily,setDaily]=useState(init.daily);
  const [weekly,setWeekly]=useState(init.weekly);
  const [logs,setLogs]=useState(init.logs);
  const [wlogs,setWlogs]=useState(init.wlogs);
  const [revEntries,setRevEntries]=useState(init.revEntries||SEED_ENTRIES);
  const [view,setView]=useState('today');
  const [addType,setAddType]=useState(null);
  const [showAddRev,setShowAddRev]=useState(false);
  const [newName,setNewName]=useState('');
  const [editId,setEditId]=useState(null);
  const [editTxt,setEditTxt]=useState('');
  const [delConf,setDelConf]=useState(null);
  const [pasteOpen,setPasteOpen]=useState(false);
  const [pasteTxt,setPasteTxt]=useState('');
  const [toast,setToast]=useState(null);
  const [syncStatus,setSyncStatus]=useState('loading');
  const [xp,setXp]=useState(()=>{try{return parseInt(localStorage.getItem('ananya_xp')||'0',10);}catch(e){return 0;}});
  const [badges,setBadges]=useState(()=>{try{return JSON.parse(localStorage.getItem('ananya_badges')||'[]');}catch(e){return [];}});
  const [notifEnabled,setNotifEnabled]=useState(()=>{try{return localStorage.getItem('ananya_notif')==='1';}catch(e){return false;}});
  const [notifTime,setNotifTime]=useState(()=>{try{return localStorage.getItem('ananya_notif_time')||'09:00';}catch(e){return '09:00';}});

  const prevXpRef=useRef(xp);
  const prevBadgesRef=useRef(badges);
  const [darkMode,setDarkMode]=useState(()=>{try{return localStorage.getItem('ananya_dark')==='1';}catch(e){return false;}});
  const [paletteId,setPaletteId]=useState(()=>{try{return localStorage.getItem('ananya_palette')||'classic';}catch(e){return 'classic';}});
  const [gateDate,setGateDate]=useState(()=>{try{return localStorage.getItem('ananya_gate_date')||'2027-02-01';}catch(e){return '2027-02-01';}});
  const [studyHours,setStudyHours]=useState(()=>{try{const r=localStorage.getItem('ananya_study_hours');return r?JSON.parse(r):{}}catch(e){return {};}});
  const [classHoursLog,setClassHoursLog]=useState(()=>{try{const r=localStorage.getItem('ananya_class_hours');return r?JSON.parse(r):{}}catch(e){return {};}});
  const [showHoursInput,setShowHoursInput]=useState(false);
  const [showClassInput,setShowClassInput]=useState(false);
  const [hoursInput,setHoursInput]=useState('');
  const [classInput,setClassInput]=useState('');
  const [tasks,setTasks]=useState(()=>{try{const r=localStorage.getItem('ananya_tasks');return r?JSON.parse(r):[]}catch(e){return [];}});
  const [showTaskInput,setShowTaskInput]=useState(false);
  const [taskText,setTaskText]=useState('');
  const [taskDate,setTaskDate]=useState('');
  const [taskPriority,setTaskPriority]=useState('medium');
  const [taskNotes,setTaskNotes]=useState('');
  const [taskRecur,setTaskRecur]=useState('none');
  const [taskReminder,setTaskReminder]=useState('');
  const [showCompletedTasks,setShowCompletedTasks]=useState(false);
  const [expandedTaskId,setExpandedTaskId]=useState(null);
  const [editingTaskId,setEditingTaskId]=useState(null);
  const [absences,setAbsences]=useState(()=>{try{const r=localStorage.getItem('ananya_absences');return r?JSON.parse(r):{}}catch(e){return {};}});
  const pomodoroRef=useRef(null);
  const prevTodayPctRef=useRef(0);
  const fileRef=useRef(null);
  applyPalette(paletteId,darkMode);

  const T=now2();
  const TK=dk(T.y,T.m,T.d);
  const CWK=wkKey();

  /* Load from Firebase on first open */
  useEffect(()=>{
    if(!window.__FB_LOAD__){setSyncStatus('offline');return;}
    window.__FB_LOAD__().then(d=>{
      if(d&&Array.isArray(d.daily)){
        setDaily(d.daily);
        if(Array.isArray(d.weekly))setWeekly(d.weekly);
        if(d.logs&&typeof d.logs==='object')setLogs(d.logs);
        if(d.wlogs&&typeof d.wlogs==='object')setWlogs(d.wlogs);
        if(Array.isArray(d.revEntries))setRevEntries(d.revEntries);
        saveLocal(d);
      }
      setSyncStatus('synced');
    }).catch(()=>setSyncStatus('offline'));
  },[]);

  /* Auto-save whenever data changes */
  const isFirstRender=useRef(true);
  const isFirstXpRender=useRef(true);
  useEffect(()=>{
    if(isFirstRender.current){isFirstRender.current=false;return;}
    const data={daily,weekly,logs,wlogs,revEntries};
    saveLocal(data);
    if(window.__FB_SAVE__){
      setSyncStatus('saving');
      clearTimeout(window._fbTimer);
      window._fbTimer=setTimeout(()=>{
        window.__FB_SAVE__(data)
          .then(()=>setSyncStatus('synced'))
          .catch(()=>setSyncStatus('offline'));
      },1500);
    }
  },[daily,weekly,logs,wlogs,revEntries]);

  /* Dark mode body class */
  useEffect(()=>{
    document.body.classList.toggle('dark',darkMode);
    try{localStorage.setItem('ananya_dark',darkMode?'1':'0');}catch(e){}
  },[darkMode]);

  useEffect(()=>{
    applyPalette(paletteId,darkMode);
    try{localStorage.setItem('ananya_palette',paletteId);}catch(e){}
  },[paletteId,darkMode]);

  /* Save tasks to localStorage */
  useEffect(()=>{
    try{localStorage.setItem('ananya_tasks',JSON.stringify(tasks));}catch(e){}
  },[tasks]);

  /* Schedule task reminder notification */
  const scheduleTaskReminder=(task)=>{
    if(!task.reminder||!task.date)return;
    if(Notification.permission!=='granted')return;
    const dt=new Date(`${task.date}T${task.reminder}`);
    const delay=dt-Date.now();
    if(delay>0){
      setTimeout(()=>{
        new Notification('HABITRA 📋',{body:`Reminder: ${task.text}`,icon:'data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDAgMTAwIj48cmVjdCB3aWR0aD0iMTAwIiBoZWlnaHQ9IjEwMCIgcng9IjIwIiBmaWxsPSIjNjc1MEE0Ii8+PHRleHQgeT0iNzUiIHg9IjUwIiB0ZXh0LWFuY2hvcj0ibWlkZGxlIiBmb250LXNpemU9IjcwIj7wn5a8PC90ZXh0Pjwvc3ZnPg=='});
      },delay);
    }
  };

  /* Request notif permission and add task */
  const addTask=()=>{
    const t=taskText.trim();
    if(!t)return;
    const newTask={id:uid(),text:t,date:taskDate||null,done:false,createdAt:todayStr(),
      priority:taskPriority,notes:taskNotes.trim(),recur:taskRecur,reminder:taskReminder||null};
    if(taskReminder&&taskDate){
      Notification.requestPermission().then(p=>{
        if(p==='granted')scheduleTaskReminder(newTask);
      });
    }
    setTasks(prev=>[...prev,newTask]);
    setTaskText('');setTaskDate('');setTaskPriority('medium');setTaskNotes('');setTaskRecur('none');setTaskReminder('');setShowTaskInput(false);
  };

  /* Toggle done — for recurring tasks, clone to next occurrence instead of just marking done */
  const toggleTask=(id)=>setTasks(prev=>prev.map(t=>{
    if(t.id!==id)return t;
    if(!t.done&&t.recur&&t.recur!=='none'&&t.date){
      // mark done and schedule next
      const nextDate=t.recur==='daily'?addDays(t.date,1):t.recur==='weekly'?addDays(t.date,7):addDays(t.date,30);
      const clone={...t,id:uid(),date:nextDate,done:false,createdAt:todayStr()};
      setTimeout(()=>setTasks(p=>[...p,clone]),50);
    }
    return {...t,done:!t.done};
  }));
  const deleteTask=(id)=>setTasks(prev=>prev.filter(t=>t.id!==id));
  const updateTask=(id,patch)=>setTasks(prev=>prev.map(t=>t.id===id?{...t,...patch}:t));
  const isTaskOverdue=(task)=>task.date&&task.date<todayStr()&&!task.done;
  const isTaskToday=(task)=>task.date===todayStr();
  const PRIORITY_CFG={high:{label:'High',color:'#D32F2F',bg:'#FFEBEE',dot:'#EF5350'},medium:{label:'Med',color:'#E65100',bg:'#FFF3E0',dot:'#FFA726'},low:{label:'Low',color:'#388E3C',bg:'#E8F5E9',dot:'#66BB6A'}};



  /* Swipe gesture handler */
  const touchStartX=useRef(null);
  const touchStartY=useRef(null);
  const handleTouchStart=useCallback(e=>{
    if(e.target.closest?.('[data-swipe-lock="true"]')){
      touchStartX.current=null;touchStartY.current=null;return;
    }
    touchStartX.current=e.touches[0].clientX;
    touchStartY.current=e.touches[0].clientY;
  },[view]);
  const handleTouchEnd=useCallback(e=>{
    if(touchStartX.current===null)return;
    const dx=e.changedTouches[0].clientX-touchStartX.current;
    const dy=e.changedTouches[0].clientY-touchStartY.current;
    if(Math.abs(dx)<70||Math.abs(dy)>35)return;
    const VIEWS=['today','weekly','revision','stats','achieve','settings'];
    const ci=VIEWS.indexOf(view);
    if(dx<0&&ci<VIEWS.length-1)setView(VIEWS[ci+1]);
    else if(dx>0&&ci>0)setView(VIEWS[ci-1]);
    touchStartX.current=null;
  },[view]);

  /* XP tracking — award XP on habit/revision changes */
  useEffect(()=>{
    if(isFirstXpRender.current){isFirstXpRender.current=false;return;}
    let gained=0;
    // Count all completed habits across all days
    let totalHabitChecks=0;
    Object.values(logs).forEach(d=>totalHabitChecks+=Object.values(d).filter(Boolean).length);
    // Count all completed revisions
    let totalRevChecks=0;
    revEntries.forEach(e=>totalRevChecks+=REV_INTERVALS.filter(iv=>e.reviews[String(iv)]===true).length);
    // Count perfect days
    let perfectDays=0;
    Object.keys(logs).forEach(k=>{
      if(daily.length>0&&daily.every((_,i)=>(logs[k]||{})[i]))perfectDays++;
    });
    // Hours XP
    const totalH=Object.values(studyHours).reduce((a,b)=>a+b,0);
    // Streak bonus
    const maxStreak=Math.max(0,...daily.map((_,i)=>getStreak(logs,i)));

    const rawXp=totalHabitChecks*XP_REWARDS.habit+perfectDays*XP_REWARDS.allHabits+
      totalRevChecks*XP_REWARDS.revision+Math.floor(totalH)*XP_REWARDS.studyHour+
      (maxStreak>=7?XP_REWARDS.streak7:0)+(maxStreak>=30?XP_REWARDS.streak30:0);

    if(rawXp!==xp){
      setXp(rawXp);
      try{localStorage.setItem('ananya_xp',String(rawXp));}catch(e){}
    }

    // Check badges
    const newBadges=checkBadges({logs,daily,revEntries,studyHours,xp:rawXp,existing:[]});
    if(newBadges.length!==badges.length||newBadges.some(b=>!badges.includes(b))){
      setBadges(newBadges);
      try{localStorage.setItem('ananya_badges',JSON.stringify(newBadges));}catch(e){}
      // Show toast for new badge
      const newOnes=newBadges.filter(b=>!badges.includes(b));
      if(newOnes.length>0){
        const b=ALL_BADGES.find(x=>x.id===newOnes[0]);
        if(b)setTimeout(()=>toast$(`${b.icon} Badge earned: ${b.name}!`),500);
      }
    }
  },[logs,daily,revEntries,studyHours]);

  /* Confetti when 100% habits done */
  useEffect(()=>{
    const pct=daily.length?Math.round(daily.filter((_,i)=>(logs[TK]||{})[i]).length/daily.length*100):0;
    if(pct===100&&prevTodayPctRef.current<100&&daily.length>0)fireConfetti();
    prevTodayPctRef.current=pct;
  },[logs,TK]);

  /* Save study hours to localStorage */
  useEffect(()=>{try{localStorage.setItem('ananya_study_hours',JSON.stringify(studyHours));}catch(e){}},
    [studyHours]);

  /* Save class hours to localStorage */
  useEffect(()=>{try{localStorage.setItem('ananya_class_hours',JSON.stringify(classHoursLog));}catch(e){}},
    [classHoursLog]);

  /* Save absences to localStorage */
  useEffect(()=>{try{localStorage.setItem('ananya_absences',JSON.stringify(absences));}catch(e){}},
    [absences]);

  /* Expose absence save for TodayView quick modal */
  useEffect(()=>{
    window.__habitra_saveAbsence=(date,data)=>{
      setAbsences(prev=>({...prev,[date]:data}));
    };
    return()=>{delete window.__habitra_saveAbsence;};
  },[]);

  /* Save gate date */
  useEffect(()=>{try{localStorage.setItem('ananya_gate_date',gateDate);}catch(e){}},
    [gateDate]);

  /* Study hours helpers */
  const todayHours=studyHours[TK]||0;
  const todayClassHours=classHoursLog[TK]||0;
  const logHours=()=>{
    const h=parseFloat(hoursInput);
    if(isNaN(h)||h<0||h>24){toast$('Enter valid hours (0-24)','err');return;}
    setStudyHours(p=>({...p,[TK]:h}));
    setShowHoursInput(false);setHoursInput('');
    const status=h>IDEAL_STUDY_HOURS?'🚀 Excellent! Beyond the goal!':h===IDEAL_STUDY_HOURS?'🏆 Best Best! Perfect 6-hour day!':'📈 Good work — push for 6hrs tomorrow!';
    toast$(`Logged ${h}h self-study ✅ ${status}`);
  };
  const logClassHours=()=>{
    const h=parseFloat(classInput);
    if(isNaN(h)||h<0||h>24){toast$('Enter valid hours (0-24)','err');return;}
    setClassHoursLog(p=>({...p,[TK]:h}));
    setShowClassInput(false);setClassInput('');
    toast$(`Logged ${h}h video lecture time ✅`);
  };
  const weekHours=useMemo(()=>{
    let t=0;
    for(let i=0;i<7;i++){const d=new Date();d.setDate(d.getDate()-i);
      const k=dk(d.getFullYear(),d.getMonth(),d.getDate());t+=studyHours[k]||0;}
    return Math.round(t*10)/10;
  },[studyHours,TK]);
  const weekClassHours=useMemo(()=>{
    let t=0;
    for(let i=0;i<7;i++){const d=new Date();d.setDate(d.getDate()-i);
      const k=dk(d.getFullYear(),d.getMonth(),d.getDate());t+=classHoursLog[k]||0;}
    return Math.round(t*10)/10;
  },[classHoursLog,TK]);
  const totalHours=useMemo(()=>Object.values(studyHours).reduce((a,b)=>a+b,0),[studyHours]);
  const totalClassHours=useMemo(()=>Object.values(classHoursLog).reduce((a,b)=>a+b,0),[classHoursLog]);

  /* GATE countdown */
  const gateCountdown=useMemo(()=>{
    const diff=Math.ceil((new Date(gateDate)-new Date())/(1000*60*60*24));
    return diff>0?diff:0;
  },[gateDate]);

  const toast$=(msg,type='ok')=>{setToast({msg,type});setTimeout(()=>setToast(null),2800);};

  /* HABIT TOGGLES */
  const toggleToday=i=>setLogs(p=>({...p,[TK]:{...(p[TK]||{}),[i]:!(p[TK]||{})[i]}}));
  const toggleWeekly=i=>setWlogs(p=>({...p,[CWK]:{...(p[CWK]||{}),[i]:!(p[CWK]||{})[i]}}));

  /* REVISION TOGGLE */
  const toggleRevision=(entryId,interval)=>{
    setRevEntries(prev=>prev.map(e=>{
      if(e.id!==entryId)return e;
      const cur=e.reviews[String(interval)];
      const next=cur===true?null:true;
      return{...e,reviews:{...e.reviews,[String(interval)]:next}};
    }));
  };
  const addRevEntry=entry=>{setRevEntries(p=>[entry,...p]);toast$('Session logged ✅');};
  const deleteRevEntry=id=>{setRevEntries(p=>p.filter(e=>e.id!==id));toast$('Entry deleted','warn');};

  /* HABIT ADD */
  const doAdd=()=>{
    const n=newName.trim();if(!n)return;
    if(addType==='daily')setDaily(p=>[...p,n]);else setWeekly(p=>[...p,n]);
    setNewName('');setAddType(null);toast$('Added ✅');
  };

  /* HABIT EDIT */
  const saveEdit=()=>{
    if(!editId)return;
    const n=editTxt.trim();if(!n){setEditId(null);return;}
    if(editId.type==='daily')setDaily(p=>p.map((h,i)=>i===editId.idx?n:h));
    else setWeekly(p=>p.map((h,i)=>i===editId.idx?n:h));
    setEditId(null);setEditTxt('');
  };

  /* HABIT DELETE */
  const doDelete=(type,idx)=>{
    if(type==='daily'){
      setDaily(p=>p.filter((_,i)=>i!==idx));
      setLogs(prev=>{
        const next={};
        for(const k of Object.keys(prev)){
          const e=prev[k];const ne={};
          for(const hi of Object.keys(e)){
            const h=parseInt(hi,10);
            if(h<idx)ne[h]=e[hi];else if(h>idx)ne[h-1]=e[hi];
          }
          if(Object.keys(ne).length)next[k]=ne;
        }return next;
      });
    }else{setWeekly(p=>p.filter((_,i)=>i!==idx));}
    setDelConf(null);toast$('Deleted','warn');
  };

  /* REORDER */
  const moveH=(type,idx,dir)=>{
    const ni=idx+dir;
    if(type==='daily'){
      if(ni<0||ni>=daily.length)return;
      setDaily(p=>{const a=[...p];[a[idx],a[ni]]=[a[ni],a[idx]];return a;});
      setLogs(prev=>{
        const next={};
        for(const k of Object.keys(prev)){
          const e=prev[k];if(!e)continue;
          const ne={...e};
          const av=ne[idx],bv=ne[ni];
          if(av!==undefined)ne[ni]=av;else delete ne[ni];
          if(bv!==undefined)ne[idx]=bv;else delete ne[idx];
          next[k]=ne;
        }return next;
      });
    }else{
      if(ni<0||ni>=weekly.length)return;
      setWeekly(p=>{const a=[...p];[a[idx],a[ni]]=[a[ni],a[idx]];return a;});
    }
  };

  /* BACKUP EXPORT */
  const doExport=()=>{
    const json=JSON.stringify({daily,weekly,logs,wlogs,revEntries,v:5,at:new Date().toISOString()},null,2);
    const blob=new Blob([json],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;a.download=`habitra-backup-${TK}.json`;
    document.body.appendChild(a);a.click();
    document.body.removeChild(a);URL.revokeObjectURL(url);
    toast$('Backup downloaded ✅');
  };

  /* COPY */
  const doCopy=async()=>{
    const json=JSON.stringify({daily,weekly,logs,wlogs,revEntries,v:5,at:new Date().toISOString()});
    try{await navigator.clipboard.writeText(json);toast$('Copied to clipboard ✅');}
    catch(e){toast$('Copy failed — use Download','warn');}
  };

  /* RESTORE FILE */
  const doFileRestore=e=>{
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();
    r.onload=ev=>{
      try{
        const d=JSON.parse(ev.target.result);
        if(Array.isArray(d.daily))setDaily(d.daily);
        if(Array.isArray(d.weekly))setWeekly(d.weekly);
        if(d.logs&&typeof d.logs==='object')setLogs(d.logs);
        if(d.wlogs&&typeof d.wlogs==='object')setWlogs(d.wlogs);
        if(Array.isArray(d.revEntries))setRevEntries(d.revEntries);
        toast$('Data restored ✅');
      }catch(err){toast$('Invalid file — not a Habitra backup','err');}
      e.target.value='';
    };
    r.onerror=()=>toast$('File read error','err');
    r.readAsText(f);
  };

  /* RESTORE PASTE */
  const doPasteRestore=()=>{
    try{
      const d=JSON.parse(pasteTxt.trim());
      if(Array.isArray(d.daily))setDaily(d.daily);
      if(Array.isArray(d.weekly))setWeekly(d.weekly);
      if(d.logs&&typeof d.logs==='object')setLogs(d.logs);
      if(d.wlogs&&typeof d.wlogs==='object')setWlogs(d.wlogs);
      if(Array.isArray(d.revEntries))setRevEntries(d.revEntries);
      toast$('Restored from pasted JSON ✅');
      setPasteTxt('');setPasteOpen(false);
    }catch(e){toast$('Invalid JSON','err');}
  };

  /* DERIVED */
  const todayDone=daily.filter((_,i)=>(logs[TK]||{})[i]).length;
  const todayPct=daily.length?Math.round(todayDone/daily.length*100):0;
  const bestStr=useMemo(()=>Math.max(0,...daily.map((_,i)=>getStreak(logs,i))),[logs,daily]);
  const avg30=useMemo(()=>daily.length?Math.round(daily.reduce((a,_,i)=>a+getRate(logs,i,30),0)/daily.length):0,[logs,daily]);
  const dueRevCount=useMemo(()=>getTodayDueEntries(revEntries).length,[revEntries]);
  const weakSuggestions=useMemo(()=>getWeakSuggestions({revEntries,logs,daily,studyHours}),[revEntries,logs,daily,studyHours]);

  /* NAV ITEMS */
  const NAV=[
    ['today',IC.home,'Today'],
    ['weekly',IC.cal,'Week'],
    ['revision',IC.book,'Revise'],
    ['stats',IC.bar,'Stats'],
    ['achieve','🏆','Achieve'],
    ['settings',IC.gear,'More'],
  ];

  /* ── SIDEBAR NAV COMPONENT ── */
  const SidebarNav=()=>(
    <nav className="sidebar-nav"
      style={{background:darkMode?'#1A1726':SUR}}>
      {/* Logo in sidebar */}
      <div style={{display:'flex',alignItems:'center',gap:10,padding:'0 14px 24px',marginBottom:8,
        borderBottom:`1px solid ${darkMode?'#3D3257':OL}`}}>
        <div style={{width:36,height:36,borderRadius:12,
          background:`linear-gradient(135deg,${P},${P2})`,
          display:'flex',alignItems:'center',justifyContent:'center',
          boxShadow:'0 3px 10px rgba(124,77,255,0.35)',flexShrink:0}}>
          <Ico d={IC.flame} s={18} c='#FFF' fill='none'/>
        </div>
        <div>
          <div style={{fontSize:16,fontWeight:900,color:P,letterSpacing:-0.3}}>HABITRA</div>
          <div style={{fontSize:9,color:TS,fontWeight:500,marginTop:-1}}>GATE 2027</div>
        </div>
      </div>

      {NAV.map(([id,icon,lbl])=>{
        const isActive=view===id;
        return(
          <button key={id} onClick={()=>setView(id)}
            className={`snav-btn${isActive?' active':''}`}
            style={{color:isActive?P:darkMode?'#BDB8D0':TM,
              background:isActive?PC:'transparent'}}>
            <div style={{width:28,height:28,borderRadius:9,flexShrink:0,
              background:isActive?'transparent':'transparent',
              display:'flex',alignItems:'center',justifyContent:'center'}}>
              {typeof icon==='string'&&icon.length<=2?(
                <span style={{fontSize:17}}>{icon}</span>
              ):(
                <Ico d={icon} s={18} c={isActive?P:darkMode?'#BDB8D0':TM}/>
              )}
            </div>
            <span>{lbl}</span>
            {id==='revision'&&dueRevCount>0&&(
              <span className="snav-badge"
                style={{background:'#E65100',color:'#FFF'}}>
                {dueRevCount>9?'9+':dueRevCount}
              </span>
            )}
            {id==='weekly'&&weekly.length>0&&(
              <span className="snav-badge" style={{background:'#43A047',color:'#FFF'}}>
                {weekly.filter((_,i)=>(wlogs[CWK]||{})[i]).length}/{weekly.length}
              </span>
            )}
            {id==='achieve'&&(
              <span className="snav-badge"
                style={{background:P,color:'#FFF'}}>
                Lv{getLevel(xp)}
              </span>
            )}
          </button>
        );
      })}

      {/* Sync status at bottom of sidebar */}
      <div style={{marginTop:'auto',paddingTop:20,borderTop:`1px solid ${darkMode?'#3D3257':OL}`,marginTop:16}}>
        <div style={{borderRadius:12,padding:'8px 14px',fontSize:11,fontWeight:700,
          display:'flex',alignItems:'center',gap:6,
          background:syncStatus==='synced'?(darkMode?'#0E2215':'#E8F5E9'):syncStatus==='saving'?(darkMode?'#2A1800':'#FFF3E0'):(darkMode?'#2A1010':'#FFEBEE'),
          color:syncStatus==='synced'?(darkMode?'#81C784':'#2E7D32'):syncStatus==='saving'?(darkMode?'#FFB74D':'#E65100'):(darkMode?'#FF8A80':'#B71C1C')}}>
          <span>{syncStatus==='synced'?'☁️':syncStatus==='saving'?'⏳':'📴'}</span>
          <span>{syncStatus==='synced'?'Synced':syncStatus==='saving'?'Saving…':'Offline'}</span>
        </div>
      </div>
    </nav>
  );

  /* Show loading screen while fetching from Firebase */
  if(syncStatus==='loading'){
    return(
      <div style={{minHeight:'100vh',background:BG,display:'flex',flexDirection:'column',
        alignItems:'center',justifyContent:'center',gap:16}}>
        <div style={{width:64,height:64,borderRadius:20,
          background:`linear-gradient(135deg,${P},${P2})`,
          display:'flex',alignItems:'center',justifyContent:'center',
          boxShadow:'0 6px 20px rgba(124,77,255,0.4)'}}>
          <Ico d={IC.flame} s={32} c='#FFF' fill='none'/>
        </div>
        <div style={{fontSize:24,fontWeight:900,color:P,letterSpacing:-0.5}}>HABITRA</div>
        <div style={{fontSize:13,color:TS,fontWeight:600}}>Syncing your data… ☁️</div>
        <div style={{width:140,height:4,background:OL,borderRadius:2,overflow:'hidden',marginTop:4}}>
          <div style={{width:'60%',height:'100%',background:`linear-gradient(90deg,${P},${P2})`,
            borderRadius:2,animation:'slide 1.2s ease-in-out infinite'}}/>
        </div>
        <style>{`@keyframes slide{0%{transform:translateX(-100%)}100%{transform:translateX(200%)}}`}</style>
      </div>
    );
  }

  return(
    <div onTouchStart={handleTouchStart} onTouchEnd={handleTouchEnd}
      className="app-shell"
      style={{background:darkMode?'#1A1625':BG}}>
      {darkMode&&<style>{`
        body,#root{background:#0F0D14!important}
        .sidebar-nav .snav-btn:hover:not(.active){background:rgba(255,255,255,0.06)!important}
        input,textarea,select{background:#221F33!important;color:#EDE9FF!important;border-color:#332F50!important;}
        input::placeholder,textarea::placeholder{color:#5A5474!important;}
        input[type="date"]::-webkit-calendar-picker-indicator{filter:invert(0.7);}
        /* Weekly summary card */
        .weekly-summary-card{background:linear-gradient(135deg,#0E2215,#152A1A)!important;border-color:#1E4025!important;}
        /* Revision due/complete summary cards */
