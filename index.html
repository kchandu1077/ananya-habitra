        .rev-done-card div{color:#81C784!important;}
        /* Stats best-streak / avg30 */
        .stats-streak-card{background:linear-gradient(135deg,#1E1835,#2A2050)!important;border-color:#3D3260!important;}
        .stats-avg30-card{background:linear-gradient(135deg,#0D2010,#152A18)!important;border-color:#1E4025!important;}
        /* Hours summary cards */
        .hours-self-card{background:linear-gradient(135deg,#0D2010,#152A18)!important;border-color:#1E4025!important;}
        .hours-class-card{background:linear-gradient(135deg,#0A1A30,#102240)!important;border-color:#1A3460!important;}
        /* Delete confirm red box */
        .del-warning-box{background:#2A1010!important;border-color:#4A2020!important;}
        /* Suggestion item overrides */
        .suggestion-item-overdues{background:#2A1800!important;border-color:#4A3000!important;}
        .suggestion-item-overdues>div>div{color:#FFB74D!important;}
        /* Heatmap legend none */
        .heatmap-cell-none{background:#1E1B2E!important;color:#3D3A5A!important;}
        /* Subject mastery heatmap cells — darken all */
        .subj-mastery-none{background:#1E1B2E!important;color:#4A4568!important;}
        .subj-mastery-strong{background:#0D2010!important;}
        .subj-mastery-ok{background:#2A2000!important;}
        .subj-mastery-weak{background:#2A1500!important;}
        .subj-mastery-critical{background:#2A0808!important;}
        /* Study hours chart bars */
        .hours-bar-bg{background:#221F33!important;}
        /* Weekly performance bars */
        .weekly-bar-bg{background:#221F33!important;}
        /* Absence level cards in modal */
        .absence-level-btn-selected{background:#2A1010!important;}
        /* Today habit done label — col.dk is too dark for dark bg */
        .habit-done-label{color:#A78BFA!important;opacity:0.7;}
        /* Today habit done row background */
        .habit-done-row{background:rgba(167,139,250,0.12)!important;}
        /* Suggestion items (hardcoded light bg from getWeakSuggestions) */
        .suggestion-item{background:#221F33!important;border-color:#332F50!important;}
        .suggestion-item>div>div:first-child{color:#C4B5F4!important;}
        /* Weekly summary card text */
        .weekly-summary-card div{color:#81C784!important;}
        .weekly-summary-card span{color:#66BB6A!important;}
        /* Weekly done buttons */
        .weekly-done-btn{background:#0D2010!important;border-color:#1E5020!important;}
        .weekly-done-label{color:#81C784!important;}
        /* Danger zone */
        .danger-zone-box{background:#1A0808!important;border-color:#4A1414!important;}
        .danger-reset-btn{background:#2A0F0F!important;border-color:#4A2020!important;color:#FF8A80!important;}
        /* Task form inputs - critical for usability */
        .task-input-text{background:#211E30!important;color:#EDE9FF!important;border-color:#332F50!important;}
        /* Hours day-by-day list rows */
        .hours-day-exceeded{background:#0A1A30!important;border-color:#1A3460!important;}
        .hours-day-perfect{background:#0D2010!important;border-color:#1A4020!important;}
        .hours-day-below{background:#2A1800!important;border-color:#4A3000!important;}
        .hours-day-none{background:#1A1726!important;border-color:#2E2842!important;}
        /* Hours achievement badge */  
        .hours-badge-excellent{background:#0A1A30!important;border-color:#1A3460!important;}
        .hours-badge-excellent div{color:#90CAF9!important;}
        .hours-badge-perfect{background:#0D2010!important;border-color:#1A4020!important;}
        .hours-badge-perfect div{color:#A5D6A7!important;}
        .hours-badge-logged{background:#2A1800!important;border-color:#4A3000!important;}
        .hours-badge-logged div{color:#FFB74D!important;}
        /* Absence modal level selector unselected */
        .absence-level-btn-unsel{background:#1E1B2E!important;border-color:#2E2842!important;}
        /* Heatmap bar chart bg */
        .hours-bar-container{background:#1E1B2E!important;border-color:#2E2842!important;}
        /* XP how-to-earn guide items */
        .xp-guide-item{background:#221F33!important;}
        .xp-guide-item span:first-child{color:#C4B5F4!important;}
        /* Tab bars active state text */
        .tab-active-text{color:#C4B5F4!important;}
        /* Revision card expand area */
        .rev-card-expand{background:#1E1B2E!important;}
        /* Subject filter chips unselected */
        .subj-chip-unsel{background:#1E1B2E!important;color:#C4B5F4!important;border-color:#2E2842!important;}
        /* Search input in revision */
        .rev-search-input{background:#1E1B2E!important;color:#EDE9FF!important;border-color:#2E2842!important;}
        /* Weekly done label fix */
        body.dark .weekly-done-label{color:#81C784!important;}
        /* Compact study hours strip labels */
        body.dark .study-hours-label{color:#EDE9FF!important;}
      `}</style>}



      {/* HEADER */}
      <div className="app-header"
        style={{background:darkMode?'#2D2640':SUR,
          borderBottom:`1px solid ${darkMode?'#3D3257':OL}`}}>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <div style={{width:36,height:36,borderRadius:12,
            background:`linear-gradient(135deg,${P},${P2})`,
            display:'flex',alignItems:'center',justifyContent:'center',
            boxShadow:'0 3px 10px rgba(124,77,255,0.35)'}}>
            <Ico d={IC.flame} s={18} c='#FFF' fill='none'/>
          </div>
          <div>
            <div className="header-title-main"
              style={{fontSize:16,fontWeight:900,color:P,letterSpacing:-0.3}}>HABITRA</div>
            <div className="header-title-sub"
              style={{fontSize:10,color:TS,fontWeight:500,marginTop:-1}}>
              Ananya · GATE 2027
            </div>
          </div>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:7}}>
          {view==='today'&&(
            <div style={{background:PC,borderRadius:20,padding:'5px 11px',
              fontSize:11,fontWeight:800,color:P}}>
              {todayDone}/{daily.length}
            </div>
          )}
          {view==='weekly'&&weekly.length>0&&(
            <div style={{background:darkMode?'#0E2215':'#E8F5E9',borderRadius:20,padding:'5px 11px',
              fontSize:11,fontWeight:800,color:darkMode?'#81C784':'#2E7D32',
              border:darkMode?'1px solid #1E4025':'1px solid #A5D6A7'}}>
              {weekly.filter((_,i)=>(wlogs[CWK]||{})[i]).length}/{weekly.length} 📋
            </div>
          )}
          {dueRevCount>0&&view==='today'&&(
            <div style={{background:darkMode?'#2A1800':'#FFF3E0',borderRadius:20,padding:'5px 11px',
              fontSize:11,fontWeight:800,color:darkMode?'#FFB74D':'#E65100',border:darkMode?'1px solid #5A3800':'1px solid #FFB74D'}}>
              🔁 {dueRevCount}
            </div>
          )}
          {/* Sync pill — hidden on desktop (sidebar shows it) */}
          <div style={{
              borderRadius:20,padding:'5px 11px',fontSize:11,fontWeight:800,
              display:'flex',alignItems:'center',gap:5,
              background:syncStatus==='synced'?(darkMode?'#0E2215':'#E8F5E9'):syncStatus==='saving'?(darkMode?'#2A1800':'#FFF3E0'):syncStatus==='loading'?(darkMode?'#1E1835':'#EDE7FF'):(darkMode?'#2A1010':'#FFEBEE'),
              color:syncStatus==='synced'?(darkMode?'#81C784':'#2E7D32'):syncStatus==='saving'?(darkMode?'#FFB74D':'#E65100'):syncStatus==='loading'?P:(darkMode?'#FF8A80':'#B71C1C'),
              border:`1px solid ${syncStatus==='synced'?(darkMode?'#1E4025':'#A5D6A7'):syncStatus==='saving'?(darkMode?'#5A3800':'#FFB74D'):syncStatus==='loading'?OL:(darkMode?'#4A2020':'#FFCDD2')}`}}>
            <span>{syncStatus==='synced'?'☁️ Synced':syncStatus==='saving'?'⏳ Saving…':syncStatus==='loading'?'⏳ Loading…':'📴 Offline'}</span>
          </div>
        </div>
      </div>

      {/* MAIN LAYOUT — sidebar + content */}
      <div className="main-layout">

        {/* DESKTOP SIDEBAR */}
        <SidebarNav/>

        {/* CONTENT */}
        <div className="main-content">

          {view==='today'&&(
            <TodayView daily={daily} logs={logs} TK={TK} toggleToday={toggleToday}
              revEntries={revEntries} onRevToggle={toggleRevision}
              todayDone={todayDone} todayPct={todayPct}
              bestStr={bestStr} avg30={avg30}
              gateCountdown={gateCountdown} gateDate={gateDate}
              todayHours={todayHours} weekHours={weekHours} totalHours={totalHours}
              todayClassHours={todayClassHours} weekClassHours={weekClassHours} totalClassHours={totalClassHours}
              showHoursInput={showHoursInput} setShowHoursInput={setShowHoursInput}
              hoursInput={hoursInput} setHoursInput={setHoursInput} logHours={logHours}
              showClassInput={showClassInput} setShowClassInput={setShowClassInput}
              classInput={classInput} setClassInput={setClassInput} logClassHours={logClassHours}
              darkMode={darkMode}
              suggestions={weakSuggestions}
              xp={xp} badges={badges}
              tasks={tasks} showTaskInput={showTaskInput} setShowTaskInput={setShowTaskInput}
              taskText={taskText} setTaskText={setTaskText}
              taskDate={taskDate} setTaskDate={setTaskDate}
              taskPriority={taskPriority} setTaskPriority={setTaskPriority}
              taskNotes={taskNotes} setTaskNotes={setTaskNotes}
              taskRecur={taskRecur} setTaskRecur={setTaskRecur}
              taskReminder={taskReminder} setTaskReminder={setTaskReminder}
              addTask={addTask} toggleTask={toggleTask} deleteTask={deleteTask} updateTask={updateTask}
              isTaskOverdue={isTaskOverdue} isTaskToday={isTaskToday}
              showCompletedTasks={showCompletedTasks} setShowCompletedTasks={setShowCompletedTasks}
              expandedTaskId={expandedTaskId} setExpandedTaskId={setExpandedTaskId}
              editingTaskId={editingTaskId} setEditingTaskId={setEditingTaskId}
              PRIORITY_CFG={PRIORITY_CFG}
              pomodoroRunning={false} setPomodoroRunning={()=>{}}
              pomodoroSeconds={25*60} setPomodoroSeconds={()=>{}}
              pomodoroMode={'work'} setPomodoroMode={()=>{}}
              pomodoroCount={0}
              absences={absences}
              onClearAbsence={(date)=>{
                const next={...absences};delete next[date];
                setAbsences(next);
                try{localStorage.setItem('ananya_absences',JSON.stringify(next));}catch(e){}
              }}
              studyHours={studyHours}
              classHoursLog={classHoursLog}/>
          )}
          {view==='weekly'&&(
            <WeeklyView weekly={weekly} wlogs={wlogs} CWK={CWK} toggleWeekly={toggleWeekly} darkMode={darkMode}
              wkKey={wkKey} daily={daily} logs={logs} setAddType={setAddType}/>
          )}
          {view==='revision'&&(
            <RevisionView entries={revEntries} onToggle={toggleRevision}
              onDelete={deleteRevEntry} onAdd={addRevEntry}/>
          )}
          {view==='stats'&&(
            <StatsView daily={daily} logs={logs} revEntries={revEntries}
              studyHours={studyHours} classHoursLog={classHoursLog} darkMode={darkMode}/>
          )}
          {view==='achieve'&&(
            <GamificationView xp={xp} badges={badges}
              daily={daily} logs={logs} revEntries={revEntries} studyHours={studyHours}/>
          )}
          {view==='settings'&&(
            <SettingsView daily={daily} weekly={weekly}
              setDaily={setDaily} setWeekly={setWeekly}
              setLogs={setLogs} setRevEntries={setRevEntries}
              logs={logs} revEntries={revEntries} wlogs={wlogs} setWlogs={setWlogs}
              addType={addType} setAddType={setAddType}
              newName={newName} setNewName={setNewName} doAdd={doAdd}
              editId={editId} setEditId={setEditId} editTxt={editTxt}
              setEditTxt={setEditTxt} saveEdit={saveEdit}
              delConf={delConf} setDelConf={setDelConf} doDelete={doDelete}
              moveH={moveH} pasteOpen={pasteOpen} setPasteOpen={setPasteOpen}
              pasteTxt={pasteTxt} setPasteTxt={setPasteTxt} doPasteRestore={doPasteRestore}
              doExport={doExport} doCopy={doCopy} doFileRestore={doFileRestore} fileRef={fileRef}
              darkMode={darkMode} setDarkMode={setDarkMode}
              gateDate={gateDate} setGateDate={setGateDate}
              notifEnabled={notifEnabled} setNotifEnabled={setNotifEnabled}
              notifTime={notifTime} setNotifTime={setNotifTime}
              paletteId={paletteId} setPaletteId={setPaletteId}
              TK={TK} xp={xp} badges={badges}
              totalHours={totalHours} weekHours={weekHours}
              gateCountdown={gateCountdown} todayPct={todayPct}
              bestStr={bestStr} avg30={avg30}
              absences={absences} setAbsences={setAbsences}
              studyHours={studyHours}/>
          )}
        </div>
      </div>

      {/* FAB — Weekly */}
      {view==='weekly'&&(
        <button className="fab-btn" onClick={()=>setAddType('weekly')}
          style={{position:'fixed',bottom:82,right:16,
            width:52,height:52,borderRadius:17,
            background:`linear-gradient(135deg,${P},${P2})`,
            border:'none',cursor:'pointer',
            display:'flex',alignItems:'center',justifyContent:'center',
            boxShadow:'0 6px 20px rgba(103,80,164,0.42)',zIndex:20}}>
          <Ico d={IC.plus} s={24} c='#FFF'/>
        </button>
      )}
      {/* FAB — Revision */}
      {view==='revision'&&(
        <button className="fab-btn" onClick={()=>setShowAddRev(true)}
          style={{position:'fixed',bottom:82,right:16,
            width:52,height:52,borderRadius:17,
            background:'linear-gradient(135deg,#0097A7,#00BCD4)',
            border:'none',cursor:'pointer',
            display:'flex',alignItems:'center',justifyContent:'center',
            boxShadow:'0 6px 20px rgba(0,151,167,0.42)',zIndex:20}}>
          <Ico d={IC.plus} s={24} c='#FFF'/>
        </button>
      )}

      {/* BOTTOM NAV — mobile & tablet only */}
      <nav className="bottom-nav"
        style={{background:darkMode?'rgba(45,38,64,0.97)':'rgba(255,255,255,0.97)',
          backdropFilter:'blur(12px)',
          borderTop:`1px solid ${darkMode?'#3D3257':OL}`}}>
        {NAV.map(([id,icon,lbl])=>(
          <button key={id} onClick={()=>setView(id)}
            style={{flex:1,padding:'8px 2px 6px',background:'none',border:'none',
              display:'flex',flexDirection:'column',alignItems:'center',gap:2,cursor:'pointer',
              position:'relative'}}>
            <div style={{width:40,height:27,borderRadius:14,
              background:view===id?PC:'transparent',
              display:'flex',alignItems:'center',justifyContent:'center',
              transition:'background 0.2s'}}>
              {typeof icon==='string'&&icon.length<=2?(
                <span style={{fontSize:15}}>{icon}</span>
              ):(
                <Ico d={icon} s={17} c={view===id?P:TS}/>
              )}
            </div>
            <span style={{fontSize:9,fontWeight:view===id?800:500,
              color:view===id?P:TS,letterSpacing:0.1}}>{lbl}</span>
            {id==='revision'&&dueRevCount>0&&(
              <div style={{position:'absolute',top:5,right:'18%',width:14,height:14,
                borderRadius:'50%',background:'#E65100',
                display:'flex',alignItems:'center',justifyContent:'center'}}>
                <span style={{fontSize:8,fontWeight:900,color:'#FFF'}}>{dueRevCount>9?'9+':dueRevCount}</span>
              </div>
            )}
            {id==='weekly'&&weekly.length>0&&(()=>{
              const wd=weekly.filter((_,i)=>(wlogs[CWK]||{})[i]).length;
              return wd>0?(
                <div style={{position:'absolute',top:4,right:'8%',
                  background:'#43A047',borderRadius:8,padding:'1px 5px'}}>
                  <span style={{fontSize:7,fontWeight:900,color:'#FFF'}}>{wd}/{weekly.length}</span>
                </div>
              ):null;
            })()}
            {id==='achieve'&&(
              <div style={{position:'absolute',top:4,right:'12%',
                background:P,borderRadius:8,padding:'1px 5px'}}>
                <span style={{fontSize:7,fontWeight:900,color:'#FFF'}}>Lv{getLevel(xp)}</span>
              </div>
            )}
          </button>
        ))}
      </nav>

      {/* ADD HABIT MODAL */}
      {addType&&(
        <BSModal onClose={()=>{setAddType(null);setNewName('');}}>
          <div style={{fontSize:17,fontWeight:900,color:TX,marginBottom:4}}>
            Add {addType==='daily'?'Daily Habit':'Weekly Goal'}
          </div>
          <div style={{fontSize:12,color:TS,marginBottom:14}}>
            Tip: start with an emoji 🎯
          </div>
          <input autoFocus value={newName}
            onChange={e=>setNewName(e.target.value)}
            onKeyDown={e=>{if(e.key==='Enter')doAdd();if(e.key==='Escape'){setAddType(null);setNewName('');}}}
            placeholder={addType==='daily'?'e.g. 📖 Morning revision 1hr':'e.g. 📋 Full mock test'}
            style={{width:'100%',border:`2px solid ${OL}`,borderRadius:14,
              padding:'13px 14px',fontSize:14,color:TX,background:SV,
              boxSizing:'border-box',fontWeight:600,outline:'none',
              fontFamily:'Nunito,sans-serif'}}
            onFocus={e=>e.target.style.borderColor=P}
            onBlur={e=>e.target.style.borderColor=OL}/>
          <div style={{display:'flex',gap:9,marginTop:13}}>
            <button onClick={doAdd}
              style={{flex:1,padding:'13px',
                background:`linear-gradient(90deg,${P},${P2})`,
                border:'none',borderRadius:14,color:'#FFF',
                fontWeight:900,fontSize:14,cursor:'pointer',fontFamily:'Nunito,sans-serif'}}>
              Add
            </button>
            <button onClick={()=>{setAddType(null);setNewName('');}}
              style={{flex:1,padding:'13px',background:SV,border:`2px solid ${OL}`,
                borderRadius:14,color:TM,fontWeight:700,fontSize:14,cursor:'pointer',
                fontFamily:'Nunito,sans-serif'}}>
              Cancel
            </button>
          </div>
        </BSModal>
      )}

      {/* ADD REVISION MODAL */}
      {showAddRev&&<AddRevisionModal onAdd={addRevEntry} onClose={()=>setShowAddRev(false)}/>}

      {/* DELETE CONFIRM */}
      {delConf&&(
        <BSModal onClose={()=>setDelConf(null)}>
          <div style={{fontSize:17,fontWeight:900,color:'#B71C1C',marginBottom:8}}>Delete habit?</div>
          <div className="del-warning-box" style={{fontSize:13,color:TM,marginBottom:20,
            background:'#FFEBEE',borderRadius:12,padding:'12px 14px',lineHeight:1.5}}>
            <b>"{delConf.type==='daily'?daily[delConf.idx]:weekly[delConf.idx]}"</b><br/>
            <span style={{color:'#D32F2F',fontSize:12}}>All log history for this habit will be permanently deleted.</span>
          </div>
          <div style={{display:'flex',gap:9}}>
            <button onClick={()=>doDelete(delConf.type,delConf.idx)}
              style={{flex:1,padding:'13px',background:'#FFCDD2',border:'2px solid #EF9A9A',
                borderRadius:14,color:'#B71C1C',fontWeight:900,fontSize:14,cursor:'pointer',
                fontFamily:'Nunito,sans-serif'}}>Delete</button>
            <button onClick={()=>setDelConf(null)}
              style={{flex:1,padding:'13px',background:SV,border:`2px solid ${OL}`,
                borderRadius:14,color:TM,fontWeight:700,fontSize:14,cursor:'pointer',
                fontFamily:'Nunito,sans-serif'}}>Cancel</button>
          </div>
        </BSModal>
      )}

      {/* TOAST */}
      {toast&&(
        <div style={{position:'fixed',top:76,left:'50%',transform:'translateX(-50%)',zIndex:100,
          background:toast.type==='err'?'#B71C1C':toast.type==='warn'?'#E65100':'#2E7D32',
          color:'#FFF',borderRadius:22,padding:'10px 22px',
          fontSize:13,fontWeight:800,whiteSpace:'nowrap',
          boxShadow:'0 4px 18px rgba(0,0,0,0.18)'}}>
          {toast.msg}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

</script>
</body>
</html>
