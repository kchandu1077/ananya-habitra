self.addEventListener('notificationclick',e=>{e.notification.close();e.waitUntil(clients.openWindow('/'));});
self.addEventListener('message',e=>{
  if(e.data&&e.data.type==='SCHEDULE_NOTIF'){
    const now=new Date(),target=new Date();
    const [h,m]=(e.data.time||'09:00').split(':').map(Number);

    if(target<=now)target.setDate(target.getDate()+1);
    const delay=target-now;
    setTimeout(()=>{
      self.registration.showNotification('HABITRA ⏰',{
        body:e.data.body||'Time to check your habits!',
        icon:'data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDAgMTAwIj48cmVjdCB3aWR0aD0iMTAwIiBoZWlnaHQ9IjEwMCIgcng9IjIwIiBmaWxsPSIjNjc1MEE0Ii8+PHRleHQgeT0iNzUiIHg9IjUwIiB0ZXh0LWFuY2hvcj0ibWlkZGxlIiBmb250LXNpemU9IjcwIj7wn5a8PC90ZXh0Pjwvc3ZnPg==',

  }
});
`;
  const blob=new Blob([swCode],{type:'application/javascript'});

  navigator.serviceWorker.register(swUrl).then(reg=>{
    window.__SW_REG__=reg;

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

/* ── MINIMALIST CARD SYSTEM ── */
.card{background:#FFFFFF;border-radius:16px;border:1px solid #EDE8FB;box-shadow:0 1px 6px rgba(103,80,164,0.06);}
.card-section{padding:14px 16px;}
.section-label{font-size:10px;font-weight:800;color:#9E94C0;letter-spacing:1.2px;text-transform:uppercase;margin-bottom:10px;}
.strip{display:flex;align-items:center;gap:10px;padding:11px 14px;border-bottom:1px solid #F0EAFE;}
.strip:last-child{border-bottom:none;}
.stat-pill{background:#F6F0FF;border-radius:20px;padding:3px 10px;font-size:11px;font-weight:800;color:#6750A4;}
.mini-tag{background:#EDE7FF;border-radius:8px;padding:2px 8px;font-size:10px;font-weight:800;color:#7C4DFF;}
.soft-btn{background:#F6F0FF;border:none;border-radius:10px;padding:7px 13px;font-size:12px;font-weight:800;color:#6750A4;cursor:pointer;font-family:'Nunito',sans-serif;transition:background 0.15s;}
.soft-btn:hover{background:#EDE7FF;}
.hab-row{display:flex;align-items:center;gap:11px;width:100%;padding:10px 14px;border-bottom:1px solid #F6F0FF;background:none;border-left:none;border-right:none;border-top:none;text-align:left;cursor:pointer;transition:background 0.12s;}
.hab-row:last-child{border-bottom:none;}
.hab-row:active{background:#F6F0FF;}
.section-divider{height:1px;background:#F0EAFE;margin:2px 0;}

/* ══════════════════════════════════════
   RESPONSIVE LAYOUT SYSTEM
   Mobile  : <601px   — bottom nav, full width
   Tablet  : 601-1024px — wider content, no structural change
   Desktop : >1024px  — sidebar nav, two-column where useful
══════════════════════════════════════ */

/* ── APP SHELL ── */
.app-shell{min-height:100vh;display:flex;flex-direction:column;}

/* ── HEADER ── */
.app-header{
  position:sticky;top:0;z-index:30;
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px 10px;
  border-bottom:1px solid var(--ol,#E4DAFB);
  box-shadow:0 2px 10px rgba(103,80,164,0.09);
}

/* ── SIDEBAR NAV (desktop only) ── */
.sidebar-nav{display:none;}

/* ── BOTTOM NAV (mobile/tablet) ── */
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;
  display:flex;z-index:25;
  padding-bottom:env(safe-area-inset-bottom,0px);
  box-shadow:0 -2px 14px rgba(103,80,164,0.09);
}

/* ── MAIN LAYOUT ── */
.main-layout{display:flex;flex:1;}
.main-content{
  flex:1;
  padding:14px 14px 0;
  max-width:540px;
  margin:0 auto;
  width:100%;
  padding-bottom:90px; /* space for bottom nav */
}

/* ── TABLET (601–1024px) ── */
@media(min-width:601px){
  .app-header{padding:14px 24px 12px;}
  .main-content{
    max-width:680px;
    padding:18px 24px 0;
    padding-bottom:90px;
  }
  .app-header .header-title-main{font-size:18px;}
  .app-header .header-title-sub{font-size:11px;}
  /* Wider cards on tablet */
  .card{border-radius:20px;}
  .bottom-nav button{padding:10px 4px 8px;}
  /* Two-column grid for stat cards on tablet */
  .responsive-2col{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  /* FAB bigger on tablet */
  .fab-btn{width:58px!important;height:58px!important;bottom:90px!important;right:24px!important;}
}

/* ── DESKTOP (>1024px) ── */
@media(min-width:1025px){
  body{overflow-x:hidden;}
  .app-header{padding:16px 32px 14px;max-width:none;}
  .app-header .header-title-main{font-size:20px;}

  /* Show sidebar, hide bottom nav */
  .sidebar-nav{
    display:flex;
    flex-direction:column;
    position:fixed;
    left:0;top:0;bottom:0;
    width:220px;
    padding:80px 12px 24px;
    z-index:20;
    gap:4px;
    border-right:1px solid #EDE8FB;
    overflow-y:auto;
  }
  .bottom-nav{display:none!important;}

  /* Offset content for sidebar */
  .main-layout{margin-left:220px;}
  .main-content{
    max-width:760px;
    padding:24px 32px 0;
    padding-bottom:40px;
    margin:0 auto;
  }

  /* Desktop: content columns */
  .desktop-2col{display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:start;}
  .desktop-3col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}

  /* Larger interactive elements */
  .hbtn:hover{background:rgba(103,80,164,0.06)!important;}
  .soft-btn{padding:9px 16px;font-size:13px;}
  .card{border-radius:22px;}

  /* FAB repositioned for desktop */
  .fab-btn{right:calc(50% - 380px - 24px - 220px)!important;bottom:32px!important;}
}

/* ── DARK MODE ── */
body.dark{background:#0F0D14!important;}
body.dark #root{background:#0F0D14!important;}
body.dark .sidebar-nav{background:#1A1726;border-right-color:#2E2842;}
body.dark .app-header{background:#1A1726;border-bottom-color:#2E2842;}
body.dark .card{background:#1E1B2E!important;border-color:#2E2842!important;}

body.dark input,

  background:#211E30!important;

/* ── SIDEBAR NAV BUTTON STYLES ── */
.snav-btn{
  display:flex;align-items:center;gap:10px;

  .stat-pill{font-size:13px;padding:4px 12px;}

function checkBadges({logs,daily,revEntries,studyHours,xp,existing=[]}){
  const earned=new Set(existing);
  const today=todayStr();

  // first_habit
  const anyHabit=Object.values(logs).some(d=>Object.values(d).some(Boolean));
  if(anyHabit)earned.add('first_habit');

  // streak badges
  const maxStreak=Math.max(0,...daily.map((_,i)=>getStreak(logs,i)));
  if(maxStreak>=3)earned.add('streak_3');
  if(maxStreak>=7)earned.add('streak_7');
  if(maxStreak>=30)earned.add('streak_30');

  // perfect_day
  const hasPerfect=Object.keys(logs).some(k=>{
    const d=logs[k]||{};return daily.length>0&&daily.every((_,i)=>d[i]);
  });
  if(hasPerfect)earned.add('perfect_day');

  // perfect_week — 7 consecutive days all habits done
  let consec=0;
  for(let i=0;i<90;i++){
    const dt=new Date();dt.setDate(dt.getDate()-i);
    const k=dk(dt.getFullYear(),dt.getMonth(),dt.getDate());
    const done=daily.length>0&&daily.every((_,idx)=>(logs[k]||{})[idx]);
    if(done)consec++;else break;
  }
  if(consec>=7)earned.add('perfect_week');

  // revision badges
  const completedRevs=revEntries.reduce((a,e)=>a+REV_INTERVALS.filter(iv=>e.reviews[String(iv)]===true).length,0);
  if(completedRevs>=1)earned.add('first_revision');
  if(completedRevs>=10)earned.add('rev_10');
  if(completedRevs>=50)earned.add('rev_50');
  if(revEntries.some(e=>REV_INTERVALS.every(iv=>e.reviews[String(iv)]===true)))earned.add('all_rev_done');

  // hours badges
  const totalH=Object.values(studyHours).reduce((a,b)=>a+b,0);
  if(totalH>=10)earned.add('hours_10');
  if(totalH>=50)earned.add('hours_50');
  if(totalH>=100)earned.add('hours_100');

  // level badge
  if(getLevel(xp)>=5)earned.add('level_5');

  // subjects badge
  const subjSet=new Set(revEntries.map(e=>e.subject));
  if(subjSet.size>=3)earned.add('subjects_3');

  // week_warrior — 7 consecutive days with study hours logged
  let hwk=0;
  for(let i=0;i<30;i++){
    const dt=new Date();dt.setDate(dt.getDate()-i);
    const k=dk(dt.getFullYear(),dt.getMonth(),dt.getDate());
    if(studyHours[k]>0)hwk++;else break;
  }
  if(hwk>=7)earned.add('week_warrior');

  return [...earned];
}

/* ── WEAK TOPIC SUGGESTIONS ──────────────────────── */
function getWeakSuggestions({revEntries,logs,daily,studyHours}){
  const tips=[];

  // Overdue revisions by subject
  const overdueBySubj={};
  revEntries.forEach(e=>{
    REV_INTERVALS.forEach(iv=>{
      if(isRevOverdue(e,iv)){overdueBySubj[e.subject]=(overdueBySubj[e.subject]||0)+1;}
    });
  });
  Object.entries(overdueBySubj).sort((a,b)=>b[1]-a[1]).slice(0,3).forEach(([subj,cnt])=>{
    tips.push({icon:'🔁',color:'#E65100',bg:'#FFF3E0',border:'#FFB74D',
      msg:`${subj} has ${cnt} overdue revision${cnt>1?'s':''}`,
      action:`Open Revisions → filter by ${subj}`,urgency:cnt>=3?'high':'med'});
  });

  // Low 14-day completion habits
  daily.forEach((h,i)=>{
    const rate=getRate(logs,i,14);
    if(rate<50){
      tips.push({icon:'📉',color:'#C62828',bg:'#FFEBEE',border:'#FFCDD2',
        msg:`"${h}" — only ${rate}% done in last 2 weeks`,
        action:'Focus on this habit tomorrow',urgency:rate<25?'high':'med'});
    }
  });

  // No study hours logged today
  const TK=todayStr();
  if(!studyHours[TK]){
    const yesterday=new Date();yesterday.setDate(yesterday.getDate()-1);
    const yk=dk(yesterday.getFullYear(),yesterday.getMonth(),yesterday.getDate());
    if(!studyHours[yk]){
      tips.push({icon:'📚',color:'#1565C0',bg:'#E3F2FD',border:'#90CAF9',
      msg:'No study hours logged today',action:'Go to Today -> tap Log to track time',urgency:'low'});
    }
  }

  // Subjects with no recent study (last 7 days of revisions)
  const recentSubjs=new Set();
  const cutoff=addDays(todayStr(),-7);
  revEntries.filter(e=>e.dateStudied>=cutoff).forEach(e=>recentSubjs.add(e.subject));
  const allSubjs=[...new Set(revEntries.map(e=>e.subject))];
  const neglected=allSubjs.filter(s=>!recentSubjs.has(s));
  if(neglected.length>0){
    tips.push({icon:'😴',color:'#7B1FA2',bg:'#F3E5F5',border:'#CE93D8',
      msg:`${neglected.slice(0,2).join(', ')} — no new sessions in 7 days`,
      action:'Consider adding a study session',urgency:'low'});
  }

  return tips.slice(0,5);
}

/* ── HABIT STAT UTILS ────────────────────────────────*/
const getStreak=(logs,idx)=>{
  const t=new Date();let s=0;
  for(let i=0;i<400;i++){
    const d=new Date(t);d.setDate(d.getDate()-i);
    if((logs[dk(d.getFullYear(),d.getMonth(),d.getDate())]||{})[idx])s++;else break;
  }return s;
};
const getLongest=(logs,idx)=>{
  const keys=Object.keys(logs).filter(k=>(logs[k]||{})[idx]).sort();
  if(!keys.length)return 0;
  let max=1,cur=1;
  for(let i=1;i<keys.length;i++)
    (new Date(keys[i])-new Date(keys[i-1]))/86400000===1?(cur++,max=Math.max(max,cur)):(cur=1);
  return max;
};
const getRate=(logs,idx,days)=>{
  let c=0;const t=new Date();
  for(let i=0;i<days;i++){
    const d=new Date(t);d.setDate(d.getDate()-i);
    if((logs[dk(d.getFullYear(),d.getMonth(),d.getDate())]||{})[idx])c++;
  }return Math.round(c/days*100);
};

/* ── HEATMAP COMPONENT ───────────────────────────── */
function HeatmapGrid({logs,daily,weeks=15}){
  const cells=useMemo(()=>{
    const arr=[];
    const today=new Date();
    const totalDays=weeks*7;
    // pad to start of week
    const startDay=new Date(today);
    startDay.setDate(startDay.getDate()-(totalDays-1));
    const dow=startDay.getDay();
    const padded=[];
    for(let i=0;i<dow;i++)padded.push(null);
    for(let i=0;i<totalDays;i++){
      const d=new Date(startDay);d.setDate(startDay.getDate()+i);
      const k=dk(d.getFullYear(),d.getMonth(),d.getDate());
      const done=daily.length?daily.filter((_,idx)=>(logs[k]||{})[idx]).length:0;
      const pct=daily.length?done/daily.length:0;
      padded.push({k,pct,done,total:daily.length,d:new Date(d)});
    }
    return padded;
  },[logs,daily,weeks]);

  const cols=useMemo(()=>{
    const cols=[];
    for(let c=0;c<Math.ceil(cells.length/7);c++){
      cols.push(cells.slice(c*7,(c+1)*7));
    }
    return cols;
  },[cells]);

  const cellColor=pct=>{
    if(pct===0)return OL;
    if(pct<0.4)return '#6B5B9E';
    if(pct<0.7)return P2;
    if(pct<1)return P;
    return '#2E7D32';
  };

  return(
    <div style={{overflowX:'auto',paddingBottom:4}}>
      <div style={{display:'flex',gap:2,minWidth:'fit-content'}}>
        {cols.map((col,ci)=>(
          <div key={ci} style={{display:'flex',flexDirection:'column',gap:2}}>
            {col.map((cell,ri)=>cell===null?(
              <div key={ri} style={{width:10,height:10}}/>
            ):(
              <div key={ri} title={`${cell.d.toDateString()}: ${cell.done}/${cell.total} habits`}
                style={{width:10,height:10,borderRadius:2,
                  background:cellColor(cell.pct),
                  opacity:cell.d>new Date()?0.2:1}}/>
            ))}
          </div>
        ))}
      </div>
      <div style={{display:'flex',alignItems:'center',gap:4,marginTop:7,justifyContent:'flex-end'}}>
        <span style={{fontSize:9,color:TS}}>Less</span>
        {[0,0.3,0.6,0.9,1].map(p=>(
          <div key={p} style={{width:10,height:10,borderRadius:2,background:cellColor(p)}}/>
        ))}
        <span style={{fontSize:9,color:TS}}>More</span>
      </div>
    </div>
  );
}

      const d=new Date();d.setDate(d.getDate()-i);
      const k=dk(d.getFullYear(),d.getMonth(),d.getDate());
      const done=daily.filter((_,idx)=>(logs[k]||{})[idx]).length;
      total+=done*XP_REWARDS.habit;
      if(daily.length>0&&done===daily.length)total+=XP_REWARDS.allHabits;
      if(studyHours[k])total+=Math.floor(studyHours[k])*XP_REWARDS.studyHour;
    }
    return total;
  },[logs,daily,studyHours]);

  return(

                style={{padding:'6px 12px',borderRadius:20,border:`2px solid ${subj===s?subjColor(s):OL}`,
                  background:subj===s?subjColor(s)+'22':SUR,
                  color:subj===s?subjColor(s):TM,
                  fontSize:12,fontWeight:700,cursor:'pointer',
                  fontFamily:'Nunito,sans-serif',transition:'all 0.15s'}}>
                {s}
              </button>
            ))}
          </div>
          {subj==='Other'&&(
            <input value={customSubj} onChange={e=>setCustomSubj(e.target.value)}
              placeholder="Enter subject name"
              style={getINPS()}/>
          )}
        </div>
        <div>
          <label style={getLBL()}>Topic / Chapter (optional)</label>
          <input value={topic} onChange={e=>setTopic(e.target.value)}
            placeholder="e.g. Bending Stress, Mohr's Circle"
            style={getINPS()}/>
        </div>
        <div style={{display:'flex',gap:10}}>
          <div style={{flex:1}}>
            <label style={getLBL()}>Pages (optional)</label>
            <input value={pages} onChange={e=>setPages(e.target.value)}
              placeholder="e.g. 45-67"
              style={getINPS()}/>
          </div>
          <div style={{flex:1}}>
            <label style={getLBL()}>Date Studied</label>
            <input type="date" value={date} onChange={e=>setDate(e.target.value)}
              style={getINPS()}/>
          </div>
        </div>
        <div>
          <label style={getLBL()}>Quick Notes (optional)</label>
          <textarea value={notes} onChange={e=>setNotes(e.target.value)}
            placeholder="Key concepts, doubts, formulas to remember…"
            style={getINPS({height:70,resize:'none'})}/>
        </div>
        <div style={{background:SV,borderLeft:'3px solid #43A047',borderRadius:12,padding:'10px 12px',
          fontSize:11,color:TM,lineHeight:1.6}}>
          🔁 System will auto-schedule reviews at: <b>Same Day → Day 3 → Day 6 → Day 30 → Day 60 → Day 90</b>
        </div>
        <div style={{display:'flex',gap:9,marginTop:4}}>
          <button onClick={doAdd}
            style={{flex:1,padding:'13px',
              background:`linear-gradient(90deg,${P},${P2})`,
              border:'none',borderRadius:14,color:'#FFF',
              fontWeight:900,fontSize:14,cursor:'pointer',
              fontFamily:'Nunito,sans-serif'}}>
            Log Session
          </button>
          <button onClick={onClose}
            style={{flex:1,padding:'13px',background:SV,
              border:`2px solid ${OL}`,borderRadius:14,color:TM,
              fontWeight:700,fontSize:14,cursor:'pointer',
              fontFamily:'Nunito,sans-serif'}}>
            Cancel
          </button>
        </div>
      </div>
    </BSModal>
  );
}

/* ═══════════════════════════════════════════════════
   REVISION VIEW (full tab)
   ═══════════════════════════════════════════════════ */
function RevisionView({entries,onToggle,onDelete,onAdd}){
  const [showAdd,setShowAdd]=useState(false);
  const [filterSubj,setFilterSubj]=useState('All');
  const [search,setSearch]=useState('');
  const [tab,setTab]=useState('due'); // due | all | complete

  const today=todayStr();
  const allSubjects=['All',...[...new Set(entries.map(e=>e.subject))].sort()];

  const filtered=useMemo(()=>{
    let r=entries;
    if(filterSubj!=='All')r=r.filter(e=>e.subject===filterSubj);
    if(search.trim())r=r.filter(e=>
      e.subject.toLowerCase().includes(search.toLowerCase())||
      e.topic.toLowerCase().includes(search.toLowerCase())
    );
    if(tab==='due')r=r.filter(e=>['due'].includes(getEntryStatus(e)));
    if(tab==='complete')r=r.filter(e=>getEntryStatus(e)==='complete');
    return [...r].sort((a,b)=>a.dateStudied<b.dateStudied?1:-1);
  },[entries,filterSubj,search,tab]);

  const dueCount=entries.filter(e=>getEntryStatus(e)==='due').length;
  const completeCount=entries.filter(e=>getEntryStatus(e)==='complete').length;

  return(
    <div>
      {/* summary cards */}
      <div style={{display:'flex',gap:9,marginBottom:14}}>
        <div className="rev-due-card" style={{flex:1,background:'linear-gradient(135deg,#FFF3E0,#FFE0B2)',
          borderRadius:18,padding:'13px',border:'1px solid #FFB74D',
          boxShadow:'0 2px 10px rgba(255,152,0,0.15)'}}>
          <div style={{fontSize:10,fontWeight:700,color:'#E65100',letterSpacing:1}}>DUE / OVERDUE</div>
          <div style={{fontSize:28,fontWeight:900,color:'#E65100',lineHeight:1.1}}>{dueCount}</div>
          <div style={{fontSize:11,color:'#F57C00'}}>topics need review</div>
        </div>
        <div className="rev-done-card" style={{flex:1,background:'linear-gradient(135deg,#E8F5E9,#C8E6C9)',
          borderRadius:18,padding:'13px',border:'1px solid #A5D6A7',
          boxShadow:'0 2px 10px rgba(56,142,60,0.12)'}}>
          <div style={{fontSize:10,fontWeight:700,color:'#2E7D32',letterSpacing:1}}>COMPLETE</div>
          <div style={{fontSize:28,fontWeight:900,color:'#2E7D32',lineHeight:1.1}}>{completeCount}</div>
          <div style={{fontSize:11,color:'#388E3C'}}>of {entries.length} total</div>
        </div>
      </div>

      {/* search */}
      <div style={{position:'relative',marginBottom:10}}>
        <div style={{position:'absolute',left:12,top:'50%',transform:'translateY(-50%)'}}>
          <Ico d={IC.search} s={15} c={TS}/>
        </div>
        <input value={search} onChange={e=>setSearch(e.target.value)}
          placeholder="Search subject or topic…"
          style={{width:'100%',border:`2px solid ${OL}`,borderRadius:14,
            padding:'10px 12px 10px 36px',fontSize:13,color:TX,
            background:SUR,boxSizing:'border-box',fontFamily:'Nunito,sans-serif',
            outline:'none'}}/>
      </div>

      {/* subject filter chips */}
      <div style={{display:'flex',gap:6,overflowX:'auto',marginBottom:12,
        paddingBottom:4,WebkitOverflowScrolling:'touch'}}>
        {allSubjects.map(s=>(
          <button key={s} onClick={()=>setFilterSubj(s)}
            style={{flexShrink:0,padding:'5px 12px',borderRadius:20,
              border:`2px solid ${filterSubj===s?(s==='All'?P:subjColor(s)):OL}`,
              background:filterSubj===s?(s==='All'?PC:subjColor(s)+'22'):SUR,
              color:filterSubj===s?(s==='All'?P:subjColor(s)):TM,
              fontSize:11,fontWeight:700,cursor:'pointer',
              fontFamily:'Nunito,sans-serif',whiteSpace:'nowrap'}}>
            {s}
          </button>
        ))}
      </div>

      {/* tab bar */}
      <div style={{display:'flex',background:SV,borderRadius:14,padding:3,
        marginBottom:14,gap:2}}>
        {[['due',`Due/Overdue (${dueCount})`],['all','All Entries'],['complete',`Done (${completeCount})`]].map(([id,lbl])=>(
          <button key={id} onClick={()=>setTab(id)}
            style={{flex:1,padding:'8px 4px',borderRadius:12,border:'none',
              background:tab===id?SUR:'transparent',
              color:tab===id?P:TS,
              fontSize:11,fontWeight:tab===id?800:600,cursor:'pointer',
              fontFamily:'Nunito,sans-serif',
              boxShadow:tab===id?'0 1px 4px rgba(103,80,164,0.15)':'none',
              transition:'all 0.2s'}}>
            {lbl}
          </button>
        ))}
      </div>

      {/* entries */}
      {filtered.length===0?(
        <div style={{textAlign:'center',padding:'40px 20px',color:TS}}>
          <div style={{fontSize:36,marginBottom:8}}>{tab==='due'?'🎉':'📭'}</div>
          <div style={{fontSize:15,fontWeight:700,color:TX}}>
            {tab==='due'?'No pending reviews!':'No entries found'}
          </div>
          <div style={{fontSize:13,marginTop:4}}>
            {tab==='due'?'All caught up. Keep studying!':'Try a different filter or add new entries'}
          </div>
        </div>
      ):filtered.map(entry=>(
        <RevisionCard key={entry.id} entry={entry}
          onToggle={onToggle} onDelete={onDelete}/>
      ))}

      {showAdd&&<AddRevisionModal onAdd={onAdd} onClose={()=>setShowAdd(false)}/>}
      {/* FAB handled in parent */}
    </div>
  );
}

/* ═══════════════════════════════════════════════════
   STATS VIEW
   ═══════════════════════════════════════════════════ */
function StatsView({daily,logs,revEntries,studyHours,classHoursLog,darkMode}){
  const [stab,setStab]=useState('habits');
  const bestStr=useMemo(()=>Math.max(0,...daily.map((_,i)=>getStreak(logs,i))),[logs,daily]);
  const avg30=useMemo(()=>daily.length?Math.round(daily.reduce((a,_,i)=>a+getRate(logs,i,30),0)/daily.length):0,[logs,daily]);
  const monthProgress=useMemo(()=>{
    const T=now2();
    const rel=T.d;
    let done=0;
    for(let d=1;d<=rel;d++){
      const k=dk(T.y,T.m,d);
      done+=daily.filter((_,i)=>(logs[k]||{})[i]).length;
    }
    const total=daily.length*rel;
    return{pct:total?Math.round(done/total*100):0,done,total,month:MONTHS[T.m],year:T.y};
  },[daily,logs]);

  /* revision stats per subject */
  const subjStats=useMemo(()=>{
    const m={};
    revEntries.forEach(e=>{
      if(!m[e.subject])m[e.subject]={total:0,done:0,intervals:{0:0,3:0,6:0,30:0,60:0,90:0}};
      m[e.subject].total++;
      let allDone=true;
      REV_INTERVALS.forEach(iv=>{
        if(e.reviews[String(iv)]===true)m[e.subject].intervals[iv]++;
        else allDone=false;
      });
      if(allDone)m[e.subject].done++;
    });
    return Object.entries(m).map(([s,v])=>({subject:s,...v,
      completionPct:v.total?Math.round(
        (REV_INTERVALS.reduce((a,iv)=>a+v.intervals[iv],0)/(v.total*6))*100
      ):0
    })).sort((a,b)=>b.completionPct-a.completionPct);
  },[revEntries]);

  return(
    <div>
      <div style={{background:`linear-gradient(135deg,${P},${P2})`,
        borderRadius:22,padding:'17px',color:'#FFF',boxShadow:`0 6px 20px ${P}33`,
        marginBottom:14}}>
        <div style={{fontSize:10,fontWeight:900,letterSpacing:1.2,opacity:0.75,textTransform:'uppercase'}}>
          Ananya's Monthly Progress
        </div>
        <div style={{display:'flex',alignItems:'flex-end',gap:10,marginTop:4}}>
          <div style={{fontSize:36,fontWeight:900,lineHeight:1}}>{monthProgress.pct}%</div>
          <div style={{fontSize:12,fontWeight:800,opacity:0.82,marginBottom:5}}>
            {monthProgress.done}/{monthProgress.total||0} checks in {monthProgress.month}
          </div>
        </div>
        <div style={{height:8,background:'rgba(255,255,255,0.24)',borderRadius:5,overflow:'hidden',marginTop:12}}>
          <div style={{height:'100%',width:`${monthProgress.pct}%`,
            background:'linear-gradient(90deg,#FFFFFF,#B2EBF2)',borderRadius:5,transition:'width 0.5s'}}/>
        </div>
      </div>

      <div style={{display:'flex',background:SV,borderRadius:14,padding:3,marginBottom:14,gap:2,flexWrap:'wrap'}}>
        {[['habits','Habits'],['hours','⏱ Hours'],['revision','Revision'],['report','Report'],['heatmap','🗺 Map']].map(([id,lbl])=>(
          <button key={id} onClick={()=>setStab(id)}
            style={{flex:1,padding:'9px',borderRadius:12,border:'none',
              background:stab===id?SUR:'transparent',color:stab===id?P:TS,
              fontSize:11,fontWeight:stab===id?800:600,cursor:'pointer',
              fontFamily:'Nunito,sans-serif',whiteSpace:'nowrap',
              boxShadow:stab===id?'0 1px 4px rgba(103,80,164,0.15)':'none',
              transition:'all 0.2s'}}>
            {lbl}
          </button>
        ))}
      </div>

      {stab==='habits'&&(
        <div>
            <div style={{display:'flex',gap:9,marginBottom:14}}>
            <div className="stats-streak-card" style={{flex:1,background:`linear-gradient(135deg,${PC},#DDD8FF)`,
              borderRadius:18,padding:'14px',border:`1px solid ${OL}`}}>
              <div style={{fontSize:10,fontWeight:700,color:P,letterSpacing:1}}>BEST STREAK</div>
              <div style={{fontSize:30,fontWeight:900,color:P}}>{bestStr}d</div>
            </div>
            <div className="stats-avg30-card" style={{flex:1,background:'linear-gradient(135deg,#E8F5E9,#C8E6C9)',
              borderRadius:18,padding:'14px',border:'1px solid #A5D6A7'}}>
              <div style={{fontSize:10,fontWeight:700,color:'#2E7D32',letterSpacing:1}}>30D AVG</div>
              <div style={{fontSize:30,fontWeight:900,color:'#2E7D32'}}>{avg30}%</div>
            </div>
          </div>

          {/* Activity Heatmap */}
          <div style={{background:SUR,border:`1px solid ${OL}`,borderRadius:20,
            padding:'14px',marginBottom:14,boxShadow:'0 1px 4px rgba(103,80,164,0.07)'}}>
            <div style={{fontSize:12,fontWeight:800,color:P,marginBottom:10,letterSpacing:0.5}}>
              📅 15-WEEK ACTIVITY MAP
            </div>
            <HeatmapGrid logs={logs} daily={daily} weeks={15}/>
          </div>

          {/* Peak Day Analysis */}
          {(()=>{
            const dayTotals=Array(7).fill(0);const dayCounts=Array(7).fill(0);
            Object.keys(logs).forEach(k=>{
              const d=new Date(k);const dow=d.getDay();
              const done=daily.filter((_,i)=>(logs[k]||{})[i]).length;
              const pct=daily.length?done/daily.length*100:0;
              dayTotals[dow]+=pct;dayCounts[dow]++;
            });
            const dayAvgs=WD.map((_,i)=>dayCounts[i]?Math.round(dayTotals[i]/dayCounts[i]):0);
            const best=Math.max(...dayAvgs);
            return(
              <div style={{background:SUR,border:`1px solid ${OL}`,borderRadius:20,
                padding:'14px',marginBottom:14,boxShadow:'0 1px 4px rgba(103,80,164,0.07)'}}>
                <div style={{fontSize:12,fontWeight:800,color:P,marginBottom:10,letterSpacing:0.5}}>
                  ⚡ PEAK PRODUCTIVITY DAYS
                </div>
                <div style={{display:'flex',gap:5,alignItems:'flex-end',height:60}}>
                  {WD.map((day,i)=>(
                    <div key={i} style={{flex:1,display:'flex',flexDirection:'column',
                      alignItems:'center',gap:2}}>
                      <div style={{fontSize:8,fontWeight:700,color:dayAvgs[i]===best?P:TS}}>
                        {dayAvgs[i]}%
                      </div>
                      <div style={{width:'100%',borderRadius:'3px 3px 0 0',
                        height:`${Math.max(4,dayAvgs[i])}%`,minHeight:4,
                        background:dayAvgs[i]===best?`linear-gradient(0deg,${P},${P2})`:OL,
                        transition:'height 0.4s'}}/>
                      <div style={{fontSize:8,fontWeight:dayAvgs[i]===best?800:500,
                        color:dayAvgs[i]===best?P:TS}}>{day}</div>
                    </div>
                  ))}
                </div>
                <div style={{fontSize:11,color:P,fontWeight:700,marginTop:8}}>
                  🌟 Your most productive day: {WD[dayAvgs.indexOf(best)]}
                </div>
              </div>
            );
          })()}
          {daily.map((h,i)=>{
            const col=hc(i);
            const st=getStreak(logs,i),lg=getLongest(logs,i);
            const r7=getRate(logs,i,7),r30=getRate(logs,i,30);
            return(
              <div key={i} style={{background:SUR,border:`1px solid ${OL}`,
                borderRadius:20,padding:'14px',marginBottom:9,
                boxShadow:'0 1px 4px rgba(103,80,164,0.07)'}}>
                <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:10}}>
                  <div style={{width:9,height:9,borderRadius:'50%',background:col.f}}/>
                  <span style={{fontSize:13,fontWeight:700,color:TX,flex:1}}>{h}</span>
                  {st>=3&&<Chip label={`🔥${st}d`} color={col.f} small/>}
                </div>
                <div style={{display:'flex',gap:6}}>
                  {[[`${st}d`,'Streak',col.f],[`${r7}%`,'7d',P],[`${r30}%`,'30d','#0097A7'],[`${lg}d`,'Best','#C2185B']].map(([v,l,c2])=>(
                    <div key={l} style={{flex:1,background:SV,borderRadius:12,padding:'8px 4px',textAlign:'center'}}>
                      <div style={{fontSize:15,fontWeight:900,color:c2}}>{v}</div>
                      <div style={{fontSize:9,color:TS,fontWeight:600,marginTop:1,textTransform:'uppercase',letterSpacing:0.5}}>{l}</div>
                    </div>
                  ))}
                </div>
                <div style={{height:4,background:OL,borderRadius:2,marginTop:9,overflow:'hidden'}}>
                  <div style={{height:'100%',width:`${r30}%`,background:col.f,borderRadius:2,transition:'width 0.5s'}}/>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {stab==='revision'&&(
        <div>
          <SH ch="Completion rate by subject"/>
          {subjStats.length===0&&(
            <div style={{textAlign:'center',padding:'30px',color:TS,fontSize:13}}>
              No revision data yet. Start logging study sessions!
            </div>
          )}
          {subjStats.map(({subject,total,done,completionPct,intervals})=>{
            const col=subjColor(subject);
            return(
              <div key={subject} style={{background:SUR,border:`1px solid ${OL}`,
                borderRadius:20,padding:'14px',marginBottom:10,
                boxShadow:'0 1px 4px rgba(103,80,164,0.07)'}}>
                <div style={{display:'flex',alignItems:'center',gap:9,marginBottom:10}}>
                  <div style={{width:32,height:32,borderRadius:10,background:col+'22',
                    display:'flex',alignItems:'center',justifyContent:'center'}}>
                    <span style={{fontSize:11,fontWeight:900,color:col}}>{subject.slice(0,3)}</span>
                  </div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:14,fontWeight:800,color:TX}}>{subject}</div>
                    <div style={{fontSize:11,color:TS}}>{total} sessions · {done} fully complete</div>
                  </div>
                  <div style={{fontSize:22,fontWeight:900,color:col}}>{completionPct}%</div>
                </div>
                <div style={{height:6,background:OL,borderRadius:3,overflow:'hidden',marginBottom:10}}>
                  <div style={{height:'100%',width:`${completionPct}%`,
                    background:`linear-gradient(90deg,${col},${col}88)`,
                    borderRadius:3,transition:'width 0.5s'}}/>
                </div>
                <div style={{display:'flex',gap:5,flexWrap:'wrap'}}>
                  {REV_INTERVALS.map(iv=>(
                    <div key={iv} style={{background:SV,borderRadius:10,
                      padding:'5px 8px',textAlign:'center',flex:'1 1 50px'}}>
                      <div style={{fontSize:13,fontWeight:800,color:col}}>{intervals[iv]}</div>
                      <div style={{fontSize:8,color:TS,letterSpacing:0.5}}>{REV_LABELS[iv]}</div>
                    </div>
                  ))}
                </div>
              </div>
            );
          })}
        </div>
      )}

      {stab==='report'&&(()=>{
        const weeks=[];
        for(let w=0;w<8;w++){
          const d=new Date();d.setDate(d.getDate()-w*7);
          const wk=wkKey(d);
          let totalPct=0,days=0;
          for(let dd=0;dd<7;dd++){
            const day=new Date(d);day.setDate(day.getDate()-dd);
            const k=dk(day.getFullYear(),day.getMonth(),day.getDate());
            const done=daily.filter((_,i)=>(logs[k]||{})[i]).length;
            const pct=daily.length?Math.round(done/daily.length*100):0;
            if(Object.keys(logs[k]||{}).length>0||w===0){totalPct+=pct;days++;}
          }
          const avg=days>0?Math.round(totalPct/Math.max(days,1)):0;
          const label=w===0?'This Week':w===1?'Last Week':`${w} weeks ago`;
          weeks.push({label,avg,wk});
        }
        return(
          <div>
            <SH ch="Weekly Performance — Last 8 Weeks"/>
            {weeks.map(({label,avg,wk},i)=>(
              <div key={wk} style={{background:SUR,border:`1px solid ${OL}`,
                borderRadius:18,padding:'12px 16px',marginBottom:9,
                boxShadow:'0 1px 4px rgba(103,80,164,0.07)'}}>
                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8}}>
                  <div>
                    <div style={{fontSize:13,fontWeight:700,color:TX}}>{label}</div>
                    <div style={{fontSize:10,color:TS}}>{wk}</div>
                  </div>
                  <div style={{fontSize:24,fontWeight:900,
                    color:avg>=80?'#2E7D32':avg>=50?'#F57C00':'#C62828'}}>{avg}%</div>
                </div>
                <div style={{height:8,background:OL,borderRadius:4,overflow:'hidden'}}>
                  <div style={{height:'100%',borderRadius:4,transition:'width 0.5s',
                    background:avg>=80?'linear-gradient(90deg,#43A047,#66BB6A)':avg>=50?'linear-gradient(90deg,#F57C00,#FFB74D)':'linear-gradient(90deg,#E53935,#EF9A9A)',
                    width:`${avg}%`}}/>
                </div>
                <div style={{fontSize:10,color:avg>=80?'#2E7D32':avg>=50?'#F57C00':'#C62828',
                  fontWeight:700,marginTop:5}}>
                  {avg>=80?'🏆 Excellent week!':avg>=50?'💪 Good effort, push harder':'⚠️ Needs improvement'}
                </div>
              </div>
            ))}
          </div>
        );
      })()}

      {stab==='heatmap'&&(()=>{
        const subjMap={};
        revEntries.forEach(e=>{
          const s=e.subject;
          if(!subjMap[s])subjMap[s]={subject:s,overdueCount:0,dueCount:0,doneCount:0,totalRevs:0};
          REV_INTERVALS.forEach(iv=>{
            const val=e.reviews[String(iv)];
            if(val===true)subjMap[s].doneCount++;
            else{
              const rd=getRevDate(e,iv);
              if(rd&&new Date(rd)<new Date()&&new Date(rd).toDateString()!==new Date().toDateString())subjMap[s].overdueCount++;
              else if(isRevDueToday(e,iv))subjMap[s].dueCount++;
            }
            subjMap[s].totalRevs++;
          });
        });
        const getHealth=(d)=>{
          if(!d||d.totalRevs===0)return -1;
          let sc=50+Math.round((d.doneCount/d.totalRevs)*40)-d.overdueCount*8;
          return Math.max(0,Math.min(100,sc));
        };
        const hCol=(h)=>{
          const isDk=darkMode;
          if(h<0)return{bg:isDk?'#1E1B2E':'#F0F0F0',text:isDk?'#5A5474':'#AAAAAA',label:'None',dot:'#666666'};
          if(h>=80)return{bg:isDk?'#0D2010':'#D6EDDA',text:isDk?'#81C784':'#2E7D32',label:'Strong',dot:'#43A047'};
          if(h>=55)return{bg:isDk?'#2A2000':'#FFF3CD',text:isDk?'#FFD54F':'#B57700',label:'OK',dot:'#F9A825'};
          if(h>=30)return{bg:isDk?'#2A1500':'#FFE5CC',text:isDk?'#FFB74D':'#B85C00',label:'Weak',dot:'#F57C00'};
          return{bg:isDk?'#2A0808':'#FFDDDD',text:isDk?'#EF9A9A':'#C62828',label:'Critical',dot:'#E53935'};
        };
        const allSubjs=GATE_SUBJECTS.filter(s=>s!=='Other');

            <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:7}}>

                const d=subjMap[s];

                const hc=hCol(h);
                return(
                  <div key={s} style={{background:hc.bg,borderRadius:13,padding:'9px 8px',
                    border:`1.5px solid ${hc.dot}44`,textAlign:'center'}}>

                      margin:'0 auto 4px'}}/>

                Health = completion rate + overdue penalty. Aim for all subjects ≥80% before GATE 2027.
              </div>
            </div>
          </div>
        );
      })()}

      {stab==='hours'&&(()=>{
        /* Build last 30 days data */
        const days=[];
        for(let i=29;i>=0;i--){
          const d=new Date();d.setDate(d.getDate()-i);
          const k=dk(d.getFullYear(),d.getMonth(),d.getDate());
          const selfH=studyHours[k]||0;
          const classH=(classHoursLog||{})[k]||0;
          const totalH=Math.round((selfH+classH)*10)/10;

          days.push({k,selfH,classH,totalH,dayLabel,dayShort,isToday:i===0});
        }
        const maxH=Math.max(IDEAL_STUDY_HOURS+2,...days.map(d=>d.selfH));
        const totalSelf=Math.round(days.reduce((a,d)=>a+d.selfH,0)*10)/10;
        const totalClass=Math.round(days.reduce((a,d)=>a+d.classH,0)*10)/10;
        const daysLogged=days.filter(d=>d.selfH>0).length;
        const daysExceeded=days.filter(d=>d.selfH>IDEAL_STUDY_HOURS).length;
        const daysPerfect=days.filter(d=>d.selfH===IDEAL_STUDY_HOURS).length;

            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:12}}>

                <div style={{fontSize:26,fontWeight:900,color:'#0D47A1'}}>{totalClass}h</div>
                <div style={{fontSize:10,color:'#1976D2',marginTop:1}}>
                  Target: {CLASS_HOURS_TARGET * daysLogged}h · {Math.round(CLASS_HOURS_TARGET * daysLogged>0?(totalClass/(CLASS_HOURS_TARGET*daysLogged)*100):0)}% hit

            {/* Achievement badges row */}
            <div style={{display:'flex',gap:6,marginBottom:12,flexWrap:'wrap'}}>
              <div style={{background:daysExceeded>0?'#E3F2FD':SV,border:`1px solid ${daysExceeded>0?'#90CAF9':OL}`,
                borderRadius:12,padding:'6px 10px',textAlign:'center',flex:1,minWidth:80}}>
                <div style={{fontSize:18,fontWeight:900,color:daysExceeded>0?'#1565C0':'#9E9E9E'}}>{daysExceeded}</div>

              <div style={{background:daysPerfect>0?'#E8F5E9':SV,border:`1px solid ${daysPerfect>0?'#81C784':OL}`,
                borderRadius:12,padding:'6px 10px',textAlign:'center',flex:1,minWidth:80}}>
                <div style={{fontSize:18,fontWeight:900,color:daysPerfect>0?'#2E7D32':'#9E9E9E'}}>{daysPerfect}</div>
                <div style={{fontSize:9,fontWeight:700,color:daysPerfect>0?'#2E7D32':'#9E9E9E'}}>🏆 Best Best Days</div>
              </div>
              <div style={{background:'#FFF3E0',border:'1px solid #FFCC80',
                borderRadius:12,padding:'6px 10px',textAlign:'center',flex:1,minWidth:80}}>
                <div style={{fontSize:18,fontWeight:900,color:'#E65100'}}>{daysLogged}</div>
                <div style={{fontSize:9,fontWeight:700,color:'#E65100'}}>📅 Days Logged</div>

            {/* Legend */}

              <div style={{display:'flex',gap:8,marginLeft:'auto'}}>
                <span style={{display:'flex',alignItems:'center',gap:3,fontSize:9,color:TS}}>
                  <span style={{width:8,height:8,borderRadius:2,background:'#43A047',display:'inline-block'}}/>6h=Best
                </span>
                <span style={{display:'flex',alignItems:'center',gap:3,fontSize:9,color:TS}}>
                  <span style={{width:8,height:8,borderRadius:2,background:'#1565C0',display:'inline-block'}}/>+6h
                </span>
              </div>
            </div>

            {/* Bar chart — last 30 days */}
            <div style={{background:SUR,border:`1px solid ${OL}`,borderRadius:18,
              padding:'14px 12px',marginBottom:12,
              boxShadow:'0 1px 6px rgba(103,80,164,0.07)'}}>
              {/* Ideal line label */}
              <div style={{position:'relative',marginBottom:4}}>
                <div style={{fontSize:9,fontWeight:800,color:'#43A047',letterSpacing:0.5}}>
                  ── 6h Target Line
                </div>
              </div>
              <div style={{display:'flex',alignItems:'flex-end',gap:2,height:80,position:'relative'}}>
                {/* 6hr ideal dashed line */}
                <div style={{position:'absolute',left:0,right:0,
                  bottom:`${(IDEAL_STUDY_HOURS/maxH)*80}px`,
                  borderTop:'1.5px dashed #43A047',opacity:0.6,pointerEvents:'none'}}/>
                {days.map((d,i)=>{
                  const h=d.selfH;
                  const barH=maxH>0?Math.max(h>0?3:0,(h/maxH)*80):0;
                  const exceeded=h>IDEAL_STUDY_HOURS;
                  const perfect=h===IDEAL_STUDY_HOURS;
                  const barColor=exceeded?'linear-gradient(0deg,#1565C0,#64B5F6)'
                    :perfect?'linear-gradient(0deg,#2E7D32,#66BB6A)'
                    :h>0?'linear-gradient(0deg,#E65100,#FFCC80)'

                  return(
                    <div key={d.k} style={{flex:1,display:'flex',flexDirection:'column',
                      alignItems:'center',gap:1}}>
                      <div style={{width:'100%',borderRadius:'2px 2px 0 0',
                        height:`${barH}px`,minHeight:h>0?3:0,

                        {d.isToday&&(

                    </div>

                })}
              </div>
              {/* Day labels — show every 5th */}
              <div style={{display:'flex',gap:2,marginTop:4}}>
                {days.map((d,i)=>(
                  <div key={d.k} style={{flex:1,textAlign:'center',
                    fontSize:7,color:d.isToday?P:TS,

            </div>

            {/* Per-day list (last 14 days) */}
            <div style={{fontSize:11,fontWeight:800,color:TM,marginBottom:8,letterSpacing:0.3}}>
              📋 Day-by-Day — Last 14 Days
            </div>
            {[...days].reverse().slice(0,14).map(d=>{
              const h=d.selfH;
              const exceeded=h>IDEAL_STUDY_HOURS;
              const perfect=h===IDEAL_STUDY_HOURS;
              const belowGoal=h>0&&h<IDEAL_STUDY_HOURS;
              const noLog=h===0;
              const statusIcon=exceeded?'🚀':perfect?'🏆':belowGoal?'📈':'—';
              const statusText=exceeded?`Excellent! +${Math.round((h-IDEAL_STUDY_HOURS)*10)/10}h beyond goal`
                :perfect?'Best Best! Perfect 6-hour day!'
                :belowGoal?`${Math.round((IDEAL_STUDY_HOURS-h)*10)/10}h short — scope for improvement`
                :'No study logged';
              const isDkM=darkMode;
              const bg=exceeded?(isDkM?'#0A1A30':'#EBF5FB'):perfect?(isDkM?'#0D2010':'#E9F7EF'):belowGoal?(isDkM?'#2A1800':'#FEF9E7'):(isDkM?SV:'#FAFAFA');
              const border=exceeded?(isDkM?'#1A3460':'#AED6F1'):perfect?(isDkM?'#1A4020':'#A9DFBF'):belowGoal?(isDkM?'#4A3000':'#FAD7A0'):OL;
              const statusColor=exceeded?'#1565C0':perfect?'#196F3D':belowGoal?'#CA6F1E':'#9E9E9E';
              return(
                <div key={d.k} style={{background:bg,border:`1.5px solid ${border}`,
                  borderRadius:13,padding:'10px 12px',marginBottom:7,
                  display:'flex',alignItems:'center',gap:10}}>
                  <div style={{minWidth:48,textAlign:'center'}}>
                    <div style={{fontSize:10,fontWeight:800,color:statusColor}}>{d.dayShort}</div>
                    <div style={{fontSize:9,color:TS}}>{d.dayLabel}</div>
                  </div>
                  <div style={{flex:1}}>
                    <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:4}}>
                      <span style={{fontSize:18,fontWeight:900,color:statusColor}}>
                        {h}h
                      </span>
                      <span style={{fontSize:10,color:TS}}>/ {IDEAL_STUDY_HOURS}h</span>
                      {d.classH>0&&<span style={{fontSize:10,color:'#1565C0',fontWeight:700}}>+{d.classH}h video</span>}
                    </div>
                    <div style={{height:4,background:'rgba(0,0,0,0.06)',borderRadius:2,overflow:'hidden',marginBottom:4}}>
                      <div style={{height:'100%',borderRadius:2,
                        background:exceeded?'linear-gradient(90deg,#1565C0,#64B5F6)'
                          :perfect?'linear-gradient(90deg,#2E7D32,#66BB6A)'
                          :belowGoal?'linear-gradient(90deg,#E65100,#FFCC80)':SV,
                        width:`${Math.min((h/IDEAL_STUDY_HOURS)*100,100)}%`,
                        transition:'width 0.5s'}}/>
                    </div>
                    <div style={{fontSize:10,fontWeight:700,color:statusColor}}>
                      {statusIcon} {statusText}

                </div>
              );
            })}
          </div>
        );
      })()}
    </div>
  );
}

/* ═══════════════════════════════════════════════════
   FLASHCARD STATUS MODAL
   Uses an OFFSCREEN 900×1200 canvas (never shown in DOM)
   → direct toBlob download = always crisp, no blurry
     preview-canvas scaling issues ever again.
   ═══════════════════════════════════════════════════ */
function FlashcardModal({onClose,daily,logs,TK,revEntries,xp,badges,totalHours,weekHours,gateCountdown,todayPct,bestStr,avg30}){
  const [busy,setBusy]=useState(false);

  const doneCount=daily.filter((_,i)=>(logs[TK]||{})[i]).length;
  const badgeCount=badges.length;

  /* rounded-rect helper */
  function rr(ctx,x,y,w,h,r){
    ctx.beginPath();ctx.moveTo(x+r,y);
    ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);
    ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
    ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);
    ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);
    ctx.closePath();
  }

  const generateAndDownload=()=>{
    if(busy)return;
    setBusy(true);

    /* ── offscreen canvas at full resolution ── */
    const W=900,H=1200;
    const canvas=document.createElement('canvas');
    canvas.width=W;canvas.height=H;
    const ctx=canvas.getContext('2d');

    /* 1 ── BACKGROUND gradient (teal → indigo → orange) */
    const bg=ctx.createLinearGradient(0,0,W,H);
    bg.addColorStop(0,'#3BBFB5');
    bg.addColorStop(0.45,'#4A90D9');
    bg.addColorStop(0.75,'#7B72E9');
    bg.addColorStop(1,'#E07A5F');
    ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);

    /* decorative translucent circles — same as advanced version */
    ctx.fillStyle='rgba(255,255,255,0.13)';
    for(let i=0;i<8;i++){
      ctx.beginPath();ctx.arc(110+i*105,150+i*85,88,0,Math.PI*2);ctx.fill();
    }

    /* 2 ── HEADER TEXT */
    ctx.fillStyle='#FFFFFF';
    ctx.font='900 80px Nunito, Arial';
    ctx.fillText('HABITRA',80,150);
    ctx.font='700 30px Nunito, Arial';
    ctx.fillText(new Date().toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long'}),84,200);

    /* 3 ── WHITE CARD */
    ctx.fillStyle='rgba(255,255,255,0.94)';
    rr(ctx,60,250,W-120,H-310,44);ctx.fill();

    /* 4 ── HERO STAT: "X% Today" as ONE string — no overlap ever */
    ctx.fillStyle='#1C1B1F';
    ctx.font='900 56px Nunito, Arial';
    ctx.fillText(`${todayPct}% Today`,110,348);

    /* sub-label */
    ctx.font='700 30px Nunito, Arial';
    ctx.fillStyle='#49454F';
    ctx.fillText(`${doneCount}/${daily.length} habits completed`,110,398);

    /* thin divider */
    ctx.strokeStyle='rgba(103,80,164,0.15)';ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(110,428);ctx.lineTo(W-110,428);ctx.stroke();

    /* 5 ── STAT ROWS */
    const stats=[
      ['Best streak',`${bestStr} days`],
      ['30-day average',`${avg30}%`],
      ['XP',String(xp)],
      ['Badges',`${badgeCount}/16`],
      ['GATE countdown',`${gateCountdown} days`],
    ];
    stats.forEach(([label,value],i)=>{
      const y=490+i*90;
      /* pill background */
      ctx.fillStyle='rgba(103,80,164,0.07)';
      rr(ctx,110,y-46,W-220,68,22);ctx.fill();
      /* label */
      ctx.fillStyle=P||'#6750A4';
      ctx.font='800 26px Nunito, Arial';
      ctx.textAlign='left';
      ctx.fillText(label,140,y);
      /* value — right-aligned */
      ctx.fillStyle='#1C1B1F';
      ctx.font='900 32px Nunito, Arial';
      ctx.textAlign='right';
      ctx.fillText(value,W-140,y);
    });
    ctx.textAlign='left';

    /* 6 ── FOOTER */
    ctx.fillStyle='rgba(255,255,255,0.80)';
    ctx.font='800 26px Nunito, Arial';
    ctx.fillText('Built for GATE consistency',80,H-100);
    ctx.font='600 22px Nunito, Arial';
    ctx.fillStyle='rgba(255,255,255,0.65)';
    ctx.fillText('Shared from my personal tracker',80,H-65);

    /* level badge bottom-right */
    const lvlTxt=`Lv${getLevel(xp)} · ${getLevelName(xp)}`;
    ctx.font='800 22px Nunito, Arial';
    ctx.textAlign='right';
    ctx.fillStyle='rgba(255,255,255,0.75)';
    ctx.fillText(lvlTxt,W-80,H-65);
    ctx.textAlign='left';

    /* 7 ── download */
    canvas.toBlob(blob=>{
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a');
      a.href=url;
      a.download=`habitra-streak-${new Date().toISOString().split('T')[0]}.png`;
      document.body.appendChild(a);a.click();
      document.body.removeChild(a);URL.revokeObjectURL(url);
      setBusy(false);
    },'image/png');
  };

  return(
    <div onClick={onClose}
      style={{position:'fixed',inset:0,background:'rgba(15,13,20,0.72)',
        display:'flex',alignItems:'center',justifyContent:'center',
        zIndex:60,backdropFilter:'blur(10px)',padding:'20px'}}>
      <div onClick={e=>e.stopPropagation()}
        style={{background:'#FFFFFF',borderRadius:24,overflow:'hidden',
          width:'100%',maxWidth:400,
          boxShadow:'0 24px 64px rgba(0,0,0,0.30)'}}>

        {/* header */}
        <div style={{padding:'16px 20px',display:'flex',alignItems:'center',
          borderBottom:'1px solid #F0EAFE'}}>
          <span style={{flex:1,fontSize:15,fontWeight:900,color:'#1C1B1F'}}>Share Card</span>
          <button onClick={onClose}
            style={{background:'#F6F0FF',border:'none',borderRadius:8,
              width:32,height:32,cursor:'pointer',color:'#6750A4',
              fontSize:20,fontWeight:700,lineHeight:'32px',textAlign:'center',
              display:'flex',alignItems:'center',justifyContent:'center'}}>×</button>
        </div>

        {/* preview thumbnail — pure CSS, no canvas shown */}
        <div style={{margin:'20px 20px 0',borderRadius:18,overflow:'hidden',
          background:'linear-gradient(135deg,#3BBFB5 0%,#4A90D9 45%,#7B72E9 75%,#E07A5F 100%)',
          padding:'22px 22px 18px',
          boxShadow:'0 4px 20px rgba(103,80,164,0.20)'}}>
          {/* HABITRA label */}
          <div style={{display:'inline-block',background:'rgba(255,255,255,0.22)',
            borderRadius:20,padding:'5px 14px',
            fontSize:14,fontWeight:900,color:'#FFF',marginBottom:6,letterSpacing:0.5}}>HABITRA</div>
          <div style={{fontSize:11,fontWeight:700,color:'rgba(255,255,255,0.85)',marginBottom:12}}>
            {new Date().toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long'})}
          </div>
          {/* white card preview */}
          <div style={{background:'rgba(255,255,255,0.95)',borderRadius:16,padding:'14px 16px'}}>
            <div style={{fontSize:20,fontWeight:900,color:'#1C1B1F'}}>{todayPct}% Today</div>
            <div style={{fontSize:11,color:'#79747E',marginBottom:10}}>{doneCount}/{daily.length} habits completed</div>
            {[['Best streak',`${bestStr} days`],['30-day avg',`${avg30}%`],['GATE countdown',`${gateCountdown} days`]].map(([l,v])=>(
              <div key={l} style={{display:'flex',justifyContent:'space-between',
                background:'rgba(103,80,164,0.07)',borderRadius:10,
                padding:'7px 11px',marginBottom:5}}>
                <span style={{fontSize:11,fontWeight:700,color:P||'#6750A4'}}>{l}</span>
                <span style={{fontSize:12,fontWeight:900,color:'#1C1B1F'}}>{v}</span>
              </div>
            ))}
          </div>
          <div style={{fontSize:10,fontWeight:700,color:'rgba(255,255,255,0.7)',marginTop:10}}>
            Built for GATE consistency · Shared from my personal tracker
          </div>
        </div>

        <div style={{padding:'16px 20px 20px'}}>
          <p style={{fontSize:12,color:'#79747E',marginBottom:14,textAlign:'center'}}>
            Tap below to download a full-quality 900×1200 PNG
          </p>
          <button onClick={generateAndDownload} disabled={busy}
            style={{width:'100%',padding:'14px',
              background:busy?'#C4B5F4':`linear-gradient(90deg,${P||'#6750A4'},${P2||'#9C68FF'})`,
              border:'none',borderRadius:14,color:'#FFF',
              fontWeight:900,fontSize:15,cursor:busy?'default':'pointer',
              fontFamily:'Nunito,sans-serif',
              boxShadow:'0 4px 16px rgba(103,80,164,0.35)',
              transition:'opacity 0.2s'}}>
            {busy?'Generating…':'Download Share Card'}
          </button>
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════
   TODAY VIEW — Minimalist redesign
   ═══════════════════════════════════════════════════ */
function TodayView({daily,logs,TK,toggleToday,revEntries,onRevToggle,todayDone,todayPct,bestStr,avg30,
  gateCountdown,gateDate,todayHours,weekHours,totalHours,
  todayClassHours,weekClassHours,totalClassHours,
  showHoursInput,setShowHoursInput,hoursInput,setHoursInput,logHours,
  showClassInput,setShowClassInput,classInput,setClassInput,logClassHours,
  darkMode,
  suggestions,xp,badges,
  tasks,showTaskInput,setShowTaskInput,taskText,setTaskText,taskDate,setTaskDate,
  taskPriority,setTaskPriority,taskNotes,setTaskNotes,taskRecur,setTaskRecur,taskReminder,setTaskReminder,
  addTask,toggleTask,deleteTask,updateTask,isTaskOverdue,isTaskToday,
  showCompletedTasks,setShowCompletedTasks,expandedTaskId,setExpandedTaskId,
  editingTaskId,setEditingTaskId,PRIORITY_CFG,
  pomodoroRunning,setPomodoroRunning,
  pomodoroSeconds,setPomodoroSeconds,pomodoroMode,setPomodoroMode,pomodoroCount,
  absences,onClearAbsence,studyHours,classHoursLog}){
